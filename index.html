<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mais Acessível App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f7f7f5;color:#1a1a1a;font-size:15px}
input,select{outline:none;font-family:inherit}
input:focus,select:focus{border-color:#d97706!important}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#d97706;border-radius:3px}
@keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-5px)}50%{transform:translateX(5px)}}
.shake{animation:shake .4s ease}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f7f7f5}
.login-card{width:400px;background:#fff;border-radius:14px;box-shadow:0 4px 32px rgba(0,0,0,.10);overflow:hidden}
.login-bar{height:4px;background:linear-gradient(90deg,#d97706,#f59e0b,#fbbf24)}
.login-body{padding:36px 36px 32px}
.login-icon{width:56px;height:56px;background:#fff8eb;border:2px solid #fde68a;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 14px}
.login-title{text-align:center;font-size:20px;font-weight:800;color:#1a1a1a;letter-spacing:-.3px}
.login-sub{text-align:center;font-size:12px;color:#888;margin:4px 0 24px}
.login-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#666;display:block;margin-bottom:4px}
.login-input{width:100%;padding:11px 13px;border:2px solid #e8e8e6;border-radius:8px;font-size:14px;font-family:inherit;background:#fafafa;transition:border .2s}
.login-input.error{border-color:#ef4444;background:#fff5f5}
.login-err{color:#ef4444;font-size:12px;margin-top:5px}
.login-btn{width:100%;margin-top:18px;padding:12px;background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.login-hint{text-align:center;margin-top:16px;font-size:12px;color:#bbb}

/* HEADER */
header{background:#fff;border-bottom:1px solid #e8e8e6;height:80px;display:flex;align-items:center;padding:0 20px;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.logo-box{width:32px;height:32px;background:linear-gradient(135deg,#d97706,#fbbf24);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:14px;flex-shrink:0}
.app-name{font-size:14px;font-weight:800;color:#1a1a1a;letter-spacing:-.2px}
.app-sub{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.8px}
.header-right{margin-left:auto;display:flex;gap:12px;align-items:center;font-size:11px}
.badge{background:#fff8eb;border:1px solid #fde68a;border-radius:5px;padding:2px 9px;color:#92400e;font-weight:600}
.btn-out{background:#fff;border:1.5px solid #fca5a5;color:#ef4444;padding:3px 9px;border-radius:5px;cursor:pointer;font-size:10px;font-family:inherit}

/* TABS */
nav{background:#fff;border-bottom:1px solid #e8e8e6;display:flex;padding:0 18px}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;padding:11px 15px;cursor:pointer;font-size:12px;font-family:inherit;color:#888;margin-bottom:-1px;transition:color .15s}
.tab.active{color:#d97706;border-bottom-color:#d97706;font-weight:700}

/* MAIN */
main{padding:18px 20px;max-width:100%;overflow-x:hidden}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;min-width:0}
.card{background:#fff;border-radius:11px;border:1.5px solid #c8c8c4;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);min-width:0;overflow:hidden;transition:border-color .2s,box-shadow .2s;box-sizing:border-box}
.card:focus-within{border-color:#d97706;box-shadow:0 0 0 3px rgba(217,119,6,.12),0 1px 4px rgba(0,0,0,.07)}
.sec-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:#1a1a1a;border-bottom:2px solid #c8c8c4;padding-bottom:7px;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#666;display:block;margin-bottom:3px}
.inp{background:#fff;border:1.5px solid #c8c8c4;color:#1a1a1a;padding:6px 9px;border-radius:7px;font-size:12px;font-family:'Courier New',monospace;width:100%;box-sizing:border-box;outline:none}
.inp-ro{background:#f3f3f1;color:#888;cursor:default}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:7px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.g3{display:grid;grid-template-columns:1fr 1fr 60px;gap:6px}
.mb7{margin-bottom:7px}
.btn-main{background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff;border:none;padding:7px 15px;border-radius:7px;cursor:pointer;font-weight:700;font-size:11px;font-family:inherit;box-shadow:0 2px 5px rgba(217,119,6,.2)}
.btn-sm{background:#fff;border:1.5px solid #e8e8e6;color:#888;padding:3px 8px;border-radius:5px;cursor:pointer;font-size:10px;font-family:inherit}
.btn-del{background:#fff;border:1.5px solid #fca5a5;color:#ef4444;padding:3px 8px;border-radius:5px;cursor:pointer;font-size:10px}
.btn-ok{background:#ecfdf5;border:1.5px solid #6ee7b7;color:#059669;padding:4px 11px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit}
table{width:100%;border-collapse:collapse}
th{background:#f3f3f1;color:#555;font-size:11px;text-transform:uppercase;letter-spacing:.4px;padding:7px 9px;text-align:left;border-bottom:1.5px solid #c8c8c4;font-weight:700;white-space:nowrap}
td{padding:6px 9px;font-size:12px;font-family:'Courier New',monospace;border-bottom:1px solid #ddd;color:#1a1a1a}
tr:nth-child(odd){background:#fff}
tr:nth-child(even){background:#f9f9f7}
tr.hit{background:#ecfdf5!important}
.uf-badge{background:#fff8eb;color:#92400e;border:1px solid #fde68a;border-radius:3px;padding:1px 6px;font-size:10px;font-weight:700}
.best-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:7px;padding:9px 12px;margin-top:8px}
pre{background:#f3f3f1;border:1px solid #e8e8e6;border-radius:7px;padding:12px;font-family:'Courier New',monospace;font-size:11px;line-height:1.7;white-space:pre-wrap;color:#1a1a1a}

.tag-acc{color:#d97706}
.tag-blue{color:#2563eb}
.tag-green{color:#059669}

.f15{font-size:15px}
.f12{font-size:12px}
.nf-badge{background:#fff8eb;color:#92400e;border:1px solid #fde68a;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700}
.tbl-wrap{overflow-x:auto}

.ac-card-title{font-weight:700;color:#92400e;font-size:1em;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid #fde68a;}

.ac-btn-gerar{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:1em;font-weight:700;cursor:pointer;}

<script>
// ══════════════════════════════════════════
//  DADOS
// ══════════════════════════════════════════
// ══ MULTI-USER AUTH ══
const ADMIN_USER = "raul";
const FIREBASE_USERS_PATH = "usuarios";
const FIREBASE_LOGS_PATH  = "acessos";
const FIREBASE_IA_CONFIG_PATH = "iaConfig";
const FIREBASE_HISTORICO_PATH = "historicoAnaliseCredito";

function hashSimple(str){
  // Simple but consistent hash for passwords
  var h=0;
  for(var i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0;}
  return (h>>>0).toString(16);
}

async function fbGetUsers(){
  try{
    var r=await fetch(FIREBASE_DB+'/'+FIREBASE_USERS_PATH+'.json');
    return r.ok?await r.json():null;
  }catch(e){return null;}
}

async function fbSaveUser(id,data){
  await fetch(FIREBASE_DB+'/'+FIREBASE_USERS_PATH+'/'+id+'.json',{
    method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data)
  });
}

async function fbDeleteUser(id){
  await fetch(FIREBASE_DB+'/'+FIREBASE_USERS_PATH+'/'+id+'.json',{method:'DELETE'});
}

async function fbLogAccess(usuario){
  try{
    var geo=await fetch('https://ipapi.co/json/').then(r=>r.json()).catch(()=>({}));
    var log={
      usuario:usuario,
      ip:geo.ip||'',
      cidade:geo.city||'',
      regiao:geo.region||'',
      pais:geo.country_name||'',
      lat:geo.latitude||'',
      lon:geo.longitude||'',
      dt:new Date().toLocaleString('pt-BR')
    };
    var key=Date.now()+'_'+usuario;
    await fetch(FIREBASE_DB+'/'+FIREBASE_LOGS_PATH+'/'+key+'.json',{
      method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(log)
    });
  }catch(e){}
}

async function fbGetLogs(){
  try{
    var r=await fetch(FIREBASE_DB+'/'+FIREBASE_LOGS_PATH+'.json');
    return r.ok?await r.json():null;
  }catch(e){return null;}
}

async function fbGetIAConfig(){
  try{
    var r=await fetch(FIREBASE_DB+'/'+FIREBASE_IA_CONFIG_PATH+'/instrucoes.json');
    return r.ok?await r.json():'';
  }catch(e){return '';}
}

async function fbSaveIAConfig(texto){
  await fetch(FIREBASE_DB+'/'+FIREBASE_IA_CONFIG_PATH+'/instrucoes.json',{
    method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(texto)
  });
}

// Histórico de Análises de Crédito por CNPJ (retenção mínima 3 anos)
function fbHistChaveCnpj(cnpj){
  return (cnpj||'').replace(/\D/g,'');
}

async function fbGetHistoricoAnalise(cnpj){
  try{
    var chave=fbHistChaveCnpj(cnpj);
    if(!chave) return null;
    var r=await fetch(FIREBASE_DB+'/'+FIREBASE_HISTORICO_PATH+'/'+chave+'.json');
    return r.ok?await r.json():null;
  }catch(e){return null;}
}

async function fbGetTodoHistoricoAnalise(){
  try{
    var r=await fetch(FIREBASE_DB+'/'+FIREBASE_HISTORICO_PATH+'.json');
    return r.ok?await r.json():null;
  }catch(e){return null;}
}

async function fbSaveHistoricoAnalise(cnpj,registro){
  try{
    var chave=fbHistChaveCnpj(cnpj);
    if(!chave) return;
    var id='a_'+Date.now();
    await fetch(FIREBASE_DB+'/'+FIREBASE_HISTORICO_PATH+'/'+chave+'/'+id+'.json',{
      method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(registro)
    });
    // Limpa registros com mais de 3 anos (retenção mínima)
    var r=await fetch(FIREBASE_DB+'/'+FIREBASE_HISTORICO_PATH+'/'+chave+'.json');
    if(r.ok){
      var todos=await r.json();
      if(todos){
        var limite=new Date();limite.setFullYear(limite.getFullYear()-3);
        Object.entries(todos).forEach(function(e){
          var k=e[0],v=e[1];
          if(v&&v.timestamp&&new Date(v.timestamp)<limite){
            fetch(FIREBASE_DB+'/'+FIREBASE_HISTORICO_PATH+'/'+chave+'/'+k+'.json',{method:'DELETE'}).catch(function(){});
          }
        });
      }
    }
  }catch(e){}
}

function h(tag,cls,inner,attrs){

  if(cls) el.className=cls;

}

    opt.value=o; opt.textContent=o;
    if(o===val) opt.selected=true;
    el.appendChild(opt);
  });
  return el;
}

var FIREBASE_DB = 'https://maisacessivel-1d0ad-default-rtdb.firebaseio.com';

function fbPut(key, data) {
  fetch(FIREBASE_DB + '/' + key + '.json', {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  }).catch(function(e){ console.warn('[Firebase] Erro ao salvar '+key+':', e); });
}

// Inicializa: busca dados do Firebase e mescla
function fbInit() {
  // Carrega cotacoes salvas do Firebase (compartilhado entre todos os usuarios)
  function carregarSaved(){
    return fetch(FIREBASE_DB + '/saved.json')
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(data) {
        if(!data) return;
        var raw=Array.isArray(data)?data:Object.values(data);
        // Deduplica por ID (mantém mais recente)
        var map={};
        raw.forEach(function(s){
          if(s&&s.id) map[String(s.id)]=s;
        });
        var arr=Object.values(map);
        if(arr.length>0){
          SAVED.length=0;
          arr.forEach(function(s){SAVED.push(s);});
          try{localStorage.setItem('maisacessivel_saved',JSON.stringify(SAVED));}catch(e){}
          if(STATE.tab==='salvas') render();
        }
      }).catch(function(){});
  }
  carregarSaved();

  // Carrega transportadoras e embalagens
  fetch(FIREBASE_DB + '/trans.json')
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(data) {
      if(data && Array.isArray(data) && data.length>0){
        TRANS_DATA.length=0; data.forEach(function(t){TRANS_DATA.push(t);});
        try{localStorage.setItem('maisacessivel_trans',JSON.stringify(TRANS_DATA));}catch(e){}
      } else if(TRANS_DATA.length>0){
        fbPut('trans', TRANS_DATA);
      }
    }).catch(function(){});

  fetch(FIREBASE_DB + '/emb.json')
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(data) {
      if(data && Array.isArray(data) && data.length>0){
        EMBALAGENS.length=0; data.forEach(function(e){EMBALAGENS.push(e);});
        try{localStorage.setItem('maisacessivel_emb',JSON.stringify(EMBALAGENS));}catch(e){}
      } else if(EMBALAGENS.length>0){
        fbPut('emb', EMBALAGENS);
      }
    }).catch(function(){});

  // Atualiza cotacoes a cada 30s para pegar novas de outros usuarios
  setInterval(function(){
    if(document.visibilityState==='visible') carregarSaved();
  }, 15000);
}


// Auto-sync a cada 30 segundos — atualiza dados sem resetar formulário ativo
setInterval(function() {
  fetch(FIREBASE_DB + '/.json')
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(data) {
      if(!data) return;
      var mudou = false;
      if(data.saved && Array.isArray(data.saved)) {
        var fbIds = data.saved.map(function(s){return s.id;}).sort().join(',');
        var lIds  = SAVED.map(function(s){return s.id;}).sort().join(',');
        if(fbIds !== lIds) {
          SAVED.length = 0; data.saved.forEach(function(s){SAVED.push(s);}); mudou = true;
          try{localStorage.setItem('maisacessivel_saved',JSON.stringify(SAVED));}catch(e){}
        }
      }
      if(data.trans && Array.isArray(data.trans) && data.trans.length !== TRANS_DATA.length) {
        TRANS_DATA.length = 0; data.trans.forEach(function(t){TRANS_DATA.push(t);}); mudou = true;
        try{localStorage.setItem('maisacessivel_trans',JSON.stringify(TRANS_DATA));}catch(e){}
      }
      if(data.emb && Array.isArray(data.emb) && data.emb.length !== EMBALAGENS.length) {
        EMBALAGENS.length = 0; data.emb.forEach(function(e){EMBALAGENS.push(e);}); mudou = true;
        try{localStorage.setItem('maisacessivel_emb',JSON.stringify(EMBALAGENS));}catch(e){}
      }
      if(mudou) {
        var badge = document.getElementById('syncBadge');
        if(badge){ badge.style.display='inline-block'; setTimeout(function(){badge.style.display='none';},3000); }
        // Re-renderiza apenas se não estiver na aba de cotação (não interrompe digitação)
        if(STATE.tab !== 'cotacao') render();
      }
    })
    .catch(function(){});
}, 30000);

// ── Funções para salvar no localStorage + Firebase ──
function persistSaved(){
  try { localStorage.setItem('maisacessivel_saved', JSON.stringify(SAVED)); } catch(e){}
  // Salva cada cotacao individualmente no Firebase para evitar conflito entre usuarios
  SAVED.forEach(function(s){
    if(s && s.id){
      fbPut('saved/'+String(s.id).replace(/[^a-zA-Z0-9_-]/g,'_'), s);
    }
  });
}
function persistTrans(){
  try { localStorage.setItem('maisacessivel_trans', JSON.stringify(TRANS_DATA)); } catch(e){}
  fbPut('trans', TRANS_DATA);
}
function persistEmb(){
  try { localStorage.setItem('maisacessivel_emb', JSON.stringify(EMBALAGENS)); } catch(e){}
  fbPut('emb', EMBALAGENS);
}

function renderLogin(){
  var wrap=document.createElement('div');
  wrap.className='login-wrap';
  var card=document.createElement('div'); card.className='login-card';
  var bar=document.createElement('div'); bar.className='login-bar'; card.appendChild(bar);
  var body=document.createElement('div'); body.className='login-body'; card.appendChild(body);

  var logo=document.createElement('div'); logo.className='login-logo';
  logo.innerHTML='';
  body.appendChild(logo);

  var title=document.createElement('h2'); title.className='login-title'; title.textContent='MAIS ACESSÍVEL APP'; body.appendChild(title);
  var sub=document.createElement('p'); sub.className='login-sub'; sub.textContent='Sistema de Cotação de Frete'; body.appendChild(sub);

  // Usuário
  var lblU=document.createElement('label'); lblU.textContent='Usuário'; lblU.style.cssText='font-size:12px;font-weight:600;color:#666;display:block;margin-top:16px;margin-bottom:4px'; body.appendChild(lblU);
  var inpU=document.createElement('input'); inpU.type='text'; inpU.className='login-inp'; inpU.placeholder='seu usuário'; body.appendChild(inpU);

  // Senha
  var lblS=document.createElement('label'); lblS.textContent='Senha'; lblS.style.cssText='font-size:12px;font-weight:600;color:#666;display:block;margin-top:12px;margin-bottom:4px'; body.appendChild(lblS);
  var inpS=document.createElement('input'); inpS.type='password'; inpS.className='login-inp'; inpS.placeholder='sua senha'; body.appendChild(inpS);

  var err=document.createElement('p'); err.style.cssText='color:red;font-size:13px;margin-top:8px;min-height:18px'; body.appendChild(err);

  var btn=document.createElement('button'); btn.className='login-btn'; btn.textContent='Entrar'; body.appendChild(btn);

  async function tryLogin(){
    var u=inpU.value.trim().toLowerCase();
    var s=inpS.value;
    if(!u||!s){err.textContent='Informe usuário e senha.';return;}
    btn.textContent='Verificando...'; btn.disabled=true;
    try{
      var users=await fbGetUsers();
      var found=null;
      if(users){
        Object.values(users).forEach(function(usr){
          if(usr.usuario===u && usr.senha===hashSimple(s) && usr.ativo) found=usr;
        });
      }
      if(found){
        STATE.auth=true;
        STATE.usuarioLogado=found.usuario;
        STATE.roleLogado=found.role;
        localStorage.setItem('maisacessivel_session',JSON.stringify({usuario:found.usuario,role:found.role}));
        fbLogAccess(found.usuario);
        var bStr=sessionStorage.getItem('_blingPendente');
        if(bStr){window._blingImport=JSON.parse(bStr);sessionStorage.removeItem('_blingPendente');}
        render();
      } else {
        err.textContent='Usuário ou senha incorretos.';
        btn.textContent='Entrar'; btn.disabled=false;
      }
    }catch(e){err.textContent='Erro ao conectar. Tente novamente.';btn.textContent='Entrar';btn.disabled=false;}
  }

  btn.addEventListener('click', tryLogin);
  inpS.addEventListener('keydown', function(e){if(e.key==='Enter')tryLogin();});
  inpU.addEventListener('keydown', function(e){if(e.key==='Enter')inpS.focus();});

  wrap.appendChild(card);
  return wrap;
}

function renderAnaliseCredito(){
  if(!window._AC) window._AC={cliente:{},fornecedores:[{},{},{}],limitesolicitado:'',exibirResumo:false};
  var AC=window._AC;
  function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt)e.textContent=txt;return e;}
  function inp(key,lbl,ph){var w=el('div','ac-field');w.appendChild(el('label','ac-label',lbl));var i=document.createElement('input');i.className='ac-input';i.placeholder=ph||'';i.value=AC.cliente[key]||'';i.addEventListener('input',function(){AC.cliente[key]=i.value;});w.appendChild(i);return {w:w,i:i};}
  function sel(lbl,val,opts,cb){var w=el('div','ac-field');w.appendChild(el('label','ac-label',lbl));var s=document.createElement('select');s.className='ac-input';opts.forEach(function(o){var op=document.createElement('option');op.value=o.v;op.textContent=o.l;if(o.v===val)op.selected=true;s.appendChild(op);});s.addEventListener('change',function(){cb(s.value);});w.appendChild(s);return w;}
  function fmtData(s){if(!s)return '';var p=s.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:s;}
  function anosDesde(s){if(!s)return '';var d=new Date(s),n=new Date();var a=n.getFullYear()-d.getFullYear(),m=n.getMonth()-d.getMonth();if(m<0||(m===0&&n.getDate()<d.getDate()))a--;var ms=((n.getMonth()-d.getMonth())+12)%12;return a+' ano'+(a!==1?'s':'')+(ms>0?' e '+ms+(ms!==1?' meses':' mês'):'');}
  // Calcula meses decorridos desde MM/AAAA; retorna {meses, texto, categoria: 'ok'|'warn'|'err'}
  function calcMesesDesde(mmaaaa){
    if(!mmaaaa||mmaaaa.length<7) return null;
    var p=mmaaaa.split('/');if(p.length!==2) return null;
    var mes=parseInt(p[0],10)-1,ano=parseInt(p[1],10);
    if(isNaN(mes)||isNaN(ano)) return null;
    var d=new Date(ano,mes,1),n=new Date();
    var totalMeses=(n.getFullYear()-d.getFullYear())*12+(n.getMonth()-d.getMonth());
    if(totalMeses<0) return null;
    var anos=Math.floor(totalMeses/12),meses=totalMeses%12;
    var texto=(anos>0?anos+' ano'+(anos!==1?'s':'')+(meses>0?' e ':''):'')+(meses>0?meses+(meses!==1?' meses':' mês'):'')+(totalMeses===0?'menos de 1 mês':'');
    var categoria=totalMeses>=24?'ok':(totalMeses>=12?'warn':'err');
    return {meses:totalMeses, texto:texto, categoria:categoria};
  }
  function score(f){var s=0;if(f.recomenda==='sim')s+=4;else if(f.recomenda==='sim-ressalvas')s+=2;if(f.pagaemdia==='sim')s+=2;if(f.atrasou==='nao')s+=1;if(f.debitoaberto==='nao')s+=1;if(f.protestou==='nao')s+=1;if(f.aindavende==='sim')s+=1;return s;}

  var wrap=el('div','ac-wrap');

  // ======= CNPJ FIXO NO TOPO =======
  var sticky=el('div','ac-cnpj-sticky');
  sticky.appendChild(el('span','ac-cnpj-sticky-label','CNPJ'));
  var cnpjInp=document.createElement('input');
  cnpjInp.className='ac-cnpj-sticky-inp';cnpjInp.placeholder='00.000.000/0001-00';
  cnpjInp.value=AC.cliente.cpfcnpj||'';cnpjInp.maxLength=18;
  cnpjInp.addEventListener('input',function(){
    var raw=cnpjInp.value.replace(/\D/g,'').substring(0,14);
    cnpjInp.value=raw.replace(/(\d{2})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1/$2').replace(/(\d{4})(\d)/,'$1-$2');
    AC.cliente.cpfcnpj=cnpjInp.value;
  });
  cnpjInp.addEventListener('keydown',function(e){if(e.key==='Enter')btnC.click();});
  sticky.appendChild(cnpjInp);
  var btnC=el('button','ac-cnpj-sticky-btn','🔍 Consultar');
  sticky.appendChild(btnC);
  var stickyStatus=el('span','ac-cnpj-sticky-status','');
  if(AC.ultimoResultado && AC.ultimoResultado.stickyStatusHTML){
    stickyStatus.innerHTML=AC.ultimoResultado.stickyStatusHTML;
    stickyStatus.style.color=AC.ultimoResultado.stickyStatusColor||'';

  function criarUploadPdf(labelTexto, varName){
    window[varName] = window[varName] || '';
    var uploadCard=el('div','ac-upload-card');
    var uploadRow=el('div','ac-upload-row');
    uploadRow.appendChild(el('span','ac-upload-label',labelTexto));
    var fileInp=document.createElement('input');
    fileInp.type='file';fileInp.accept='application/pdf';fileInp.style.display='none';
    var btnUpload=el('button','ac-upload-btn','Selecionar PDF');
    btnUpload.type='button';
    btnUpload.onclick=function(){fileInp.click();};
    var uploadStatus=el('span','ac-upload-status','Nenhum arquivo selecionado.');
    uploadRow.appendChild(btnUpload);uploadRow.appendChild(fileInp);uploadRow.appendChild(uploadStatus);
    uploadCard.appendChild(uploadRow);

    fileInp.addEventListener('change', async function(){
      var file=fileInp.files[0];
      if(!file) return;
      uploadStatus.textContent='⏳ Lendo PDF...';
      uploadStatus.className='ac-upload-status';
      try{
        var buf=await file.arrayBuffer();
        if(typeof pdfjsLib==='undefined'){throw new Error('Biblioteca de PDF não carregou.');}
        pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        var pdf=await pdfjsLib.getDocument({data:buf}).promise;
        var textoCompleto='';
        for(var p=1;p<=pdf.numPages;p++){
          var page=await pdf.getPage(p);
          var content=await page.getTextContent();
          textoCompleto+=content.items.map(function(it){return it.str;}).join(' ')+'\n';
        }
        textoCompleto=textoCompleto.trim();
        if(!textoCompleto){throw new Error('Não foi possível extrair texto do PDF (pode ser um PDF escaneado/imagem).');}
        window[varName] = textoCompleto.substring(0,8000);
        uploadCard.classList.add('has-file');
        uploadStatus.textContent='✅ '+file.name+' — texto extraído ('+textoCompleto.length+' caracteres).';
        uploadStatus.className='ac-upload-status ok';
        var btnRemove=document.createElement('button');
        btnRemove.className='ac-upload-remove';btnRemove.textContent='Remover';btnRemove.type='button';
        btnRemove.onclick=function(){
          window[varName]='';fileInp.value='';
          uploadCard.classList.remove('has-file');
          uploadStatus.textContent='Nenhum arquivo selecionado.';uploadStatus.className='ac-upload-status';
          btnRemove.remove();
        };
        uploadRow.appendChild(btnRemove);
      }catch(err){
        window[varName]='';
        uploadStatus.textContent='❌ '+err.message;
        uploadStatus.className='ac-upload-status err';
      }
    });

    return uploadCard;
  }

            var mesesInicioContrato = inicioContrato ? mesesDesdeISO(inicioContrato.toISOString().substring(0,10)) : null;
            if(mesesFimContrato!==null && mesesFimContrato<6){
              // Contrato vencendo em menos de 6 meses = NEGADO
              vStatus='NAO_RECOMENDADO';
              motivos_neg.push('Contrato de locação com validade inferior a 6 meses');
            } else if(mesesInicioContrato!==null && mesesInicioContrato<6){
              // Ocupação com menos de 6 meses = NEGADO
              vStatus='NAO_RECOMENDADO';
              motivos_neg.push('Imóvel alugado com ocupação inferior a 6 meses');
            } else if(mesesInicioContrato!==null && mesesInicioContrato>=24){
              motivos_pos.push('Imóvel alugado com ocupação acima de 2 anos');
            } else if(mesesInicioContrato!==null && mesesInicioContrato>=12){
              if(vStatus==='RECOMENDADO') vStatus='RESSALVAS';
              motivos_atencao.push('Imóvel alugado com ocupação entre 1 e 2 anos');
            }
          } else if(imovelInfo.status==='PROPRIO'){
            motivos_pos.push('Imóvel da sede próprio');
          } else if(imovelInfo.status==='NAO_ENVIADO'){
            if(vStatus==='RECOMENDADO') vStatus='RESSALVAS';
            motivos_atencao.push('Comprovante de endereço não enviado');
          }

          // ---------- REGRA 5: DOCUMENTO DO SÓCIO ----------
          if(sociodocInfo.status==='ENVIADO'){
            motivos_pos.push('Documento de identificação do sócio enviado');
          } else {
            vStatus='NAO_RECOMENDADO';
            motivos_neg.push('Documento do sócio (RG/CNH) não enviado');
          }

          // ---------- REGRA 6: CONTRATO SOCIAL ----------
          if(window._AC_contratoTexto){
            motivos_pos.push('Contrato social enviado');
          } else {
            vStatus='NAO_RECOMENDADO';
            motivos_neg.push('Contrato social não enviado');
          }

          // ---------- REGRA 7: REFERÊNCIAS COMERCIAIS ----------
          if(refcomInfo.status==='AVALIADO' && refcomInfo.nota!==null){
            var nota=refcomInfo.nota;
            if(nota<5){
              vStatus='NAO_RECOMENDADO';
              motivos_neg.push('Referências comerciais com nota baixa ('+nota+'/10)');
            } else if(nota<8){
              if(vStatus==='RECOMENDADO') vStatus='RESSALVAS';
              motivos_atencao.push('Referências comerciais com nota intermediária ('+nota+'/10)');
            } else {
              motivos_pos.push('Referências comerciais com boa nota ('+nota+'/10)');
            }
            // Limite médio das refs vs valor solicitado
            var fornPreenchidos=(AC.fornecedores||[]).filter(function(f){return f&&f.nome&&f.nome.trim()&&f.limite;});
            if(fornPreenchidos.length>0 && AC.limitesolicitado){
            var mediaLimite=fornPreenchidos.reduce(function(acc,f){return acc+parseFloat((f.limite||'0').replace(/[^0-9.,]/g,'').replace(',','.'));},0)/fornPreenchidos.length;
              var valorSolicitado=parseFloat((AC.limitesolicitado||'0').replace(/[^0-9.,]/g,'').replace(',','.'));
              if(valorSolicitado>0 && mediaLimite>0 && mediaLimite<valorSolicitado){
                vStatus='NAO_RECOMENDADO';
                motivos_neg.push('Limite médio das referências (R$'+mediaLimite.toLocaleString('pt-BR',{maximumFractionDigits:0})+') inferior ao valor pretendido (R$'+valorSolicitado.toLocaleString('pt-BR',{maximumFractionDigits:0})+')');
              }
            }
          } else if(refcomInfo.status==='NAO_PREENCHIDO'){
            vStatus='NAO_RECOMENDADO';
            motivos_neg.push('Nenhuma referência comercial preenchida');
          }

          // ---------- PONTOS POSITIVOS ADICIONAIS ----------
          if(cenprotStatusAtual==='CONFERE') motivos_pos.push('CENPROT sem protestos confirmado');
          if(cenprotStatusAtual==='NAO_CONFERE'){ vStatus='NAO_RECOMENDADO'; motivos_neg.push('Protesto em cartório confirmado no CENPROT'); }
          if(enderecoStatusAtual==='CONFERE') motivos_pos.push('Endereço confirmado no Google Maps');
          if(enderecoStatusAtual==='NAO_CONFERE'){ vStatus='NAO_RECOMENDADO'; motivos_neg.push('Endereço NÃO confere no Google Maps'); }
          if(empresaGoogleStatusAtual==='CONFERE') motivos_pos.push('Empresa encontrada no Google');

          // ---------- CONDIÇÕES DE VENDA ----------
          var valorSolicNum=parseFloat((AC.limitesolicitado||'0').replace(/[^0-9.,]/g,'').replace(',','.'));
          var condicoesTxt='';
          var vereditoLabel='';
          if(vStatus==='RECOMENDADO'){
            vereditoLabel='✅ APROVADO — Venda com 25% de entrada + boleto parcelado';
            condicoesTxt='Condição: 25% de entrada + saldo em boleto.';
            if(valorSolicNum>=15000) condicoesTxt+=' Compra acima de R$15.000: indicar Serasa antes de fechar.';
          } else if(vStatus==='RESSALVAS'){
            vereditoLabel='⚠️ ATENÇÃO — Venda com 55% de entrada + boleto ou PIX';
            condicoesTxt='Condição: 55% de entrada + saldo em boleto ou PIX.';
            if(valorSolicNum>=15000) condicoesTxt+=' Compra acima de R$15.000: indicar Serasa antes de fechar.';
          } else {
            vereditoLabel='❌ NEGADO — Somente à vista (PIX ou dinheiro)';
            condicoesTxt='Venda somente à vista. Para prosseguir sem entrada: aprovação de um dos diretores.';
          }

          // ---------- MONTA CARD VEREDITO ----------
          var vCfgMap={
            'RECOMENDADO':     {cls:'ac-veredito-ok',   icone:'✅', label:'APROVADO PARA VENDA A PRAZO'},
            'RESSALVAS':       {cls:'ac-veredito-warn', icone:'⚠️', label:'APROVADO COM RESSALVAS'},
            'NAO_RECOMENDADO': {cls:'ac-veredito-err',  icone:'❌', label:'NEGADO — VENDA SOMENTE À VISTA'}
          };
          var vCfg=vCfgMap[vStatus];
          var vDiv=el('div','ac-veredito '+vCfg.cls);
          var motivoHtml='';
          if(motivos_neg.length) motivoHtml+='<div style="margin-top:6px;font-size:.82em;"><strong>🔴 Pontos negativos:</strong> '+motivos_neg.join(' · ')+'</div>';
          if(motivos_atencao.length) motivoHtml+='<div style="margin-top:4px;font-size:.82em;"><strong>🟡 Pontos de atenção:</strong> '+motivos_atencao.join(' · ')+'</div>';
          if(motivos_pos.length) motivoHtml+='<div style="margin-top:4px;font-size:.82em;"><strong>🟢 Pontos positivos:</strong> '+motivos_pos.join(' · ')+'</div>';
          motivoHtml+='<div style="margin-top:8px;padding-top:6px;border-top:1px solid rgba(0,0,0,.12);font-size:.88em;font-weight:700;">📋 '+condicoesTxt+'</div>';
          vDiv.innerHTML='<div class="ac-veredito-titulo">'+vCfg.icone+' '+vCfg.label+'</div>'+motivoHtml;
          iaBody.appendChild(vDiv);

          // Salva no vereditoInfo para persistência
          vereditoInfo.status=vStatus;
          vereditoInfo.motivo=condicoesTxt;
        })();

        // Guarda o resultado localmente para: (1) persistir ao trocar de sub-aba,
        // (2) permitir salvar manualmente via botão "💾 Salvar" no topo.
        var agora=new Date();
        var registroParaSalvar={
          timestamp: agora.toISOString(),
          dataExibicao: agora.toLocaleString('pt-BR'),
          operador: STATE.usuarioLogado||'',
          situacao: sit,
          capitalSocial: parseFloat(d.capital_social||0).toLocaleString('pt-BR',{minimumFractionDigits:2}),
          socioNome: (d.socios&&d.socios[0])?d.socios[0].nome:'',
          socioEntrada: socioEntrada||'',
          tempoEmpresa: tempo||'',
          parecerResumo: txt.substring(0,1500),
          contratoSocialResumo: window._AC_contratoTexto ? 'PDF de contrato social alterado foi anexado nesta consulta.' : '',
          imovelStatus: imovelInfo.status,
          imovelPeriodo: imovelInfo.status==='ALUGADO' ? ((imovelInfo.inicio||'?')+' até '+(imovelInfo.fim||'?')) : '',
          sociodocStatus: sociodocInfo.status||'',
          veredito: vereditoInfo.status||'',
          veredictoMotivo: vereditoInfo.motivo||'',
          enderecoStatus: enderecoStatusAtual||'',
          empresaGoogleStatus: empresaGoogleStatusAtual||'',
          empresaInstaStatus: empresaInstaStatusAtual||'',
          cenprotStatus: cenprotStatusAtual||'',
          refcomStatus: refcomInfo.status||'',
          refcomNota: refcomInfo.nota!==null && refcomInfo.nota!==undefined ? refcomInfo.nota : '',
          // Snapshot completo para permitir recarregar a tela via botão "Carregar" no Histórico
          snapshotCliente: AC.cliente,
          snapshotFornecedores: AC.fornecedores,
          snapshotLimiteSolicitado: AC.limitesolicitado||'',
          snapshotIaBodyHTML: iaBody.innerHTML,
          snapshotIaLinksHTML: iaLinksDiv.innerHTML,
          snapshotSocioLinksHTML: socioLinksDiv.innerHTML,
          snapshotStickyStatusHTML: stickyStatus.innerHTML,
          snapshotStickyStatusColor: stickyStatus.style.color,
          snapshotContratoTexto: window._AC_contratoTexto||'',
          snapshotImovelTexto: window._AC_imovelTexto||'',
          snapshotSocioDocTexto: window._AC_socioDocTexto||''
        };
        AC.ultimoResultado = {
          cnpj: cnpj,
          registro: registroParaSalvar,
          iaBodyHTML: iaBody.innerHTML,
          iaLinksHTML: iaLinksDiv.innerHTML,
          socioLinksHTML: socioLinksDiv.innerHTML,
          stickyStatusHTML: stickyStatus.innerHTML,
          stickyStatusColor: stickyStatus.style.color
        };
        btnSalvar.disabled=false;btnSalvar.style.opacity='1';btnSalvar.textContent='💾 Salvar';
        fase2Wrap.style.display='block';
        atualizarAvisoFase2();
      }).catch(function(){iaBody.innerHTML='<div class="ac-ia-loading">Não foi possível conectar com a IA. Tente novamente.</div>';});

    }catch(err){
      stickyStatus.textContent='❌ '+err.message;stickyStatus.style.color='#991b1b';
      iaBody.innerHTML='<div class="ac-ia-loading" style="color:#991b1b">❌ '+err.message+'</div>';
    }finally{btnC.disabled=false;btnC.textContent='🔍 Consultar';}
  }

  btnC.addEventListener('click',function(){
    var raw=(AC.cliente.cpfcnpj||'').replace(/\D/g,'');
    if(raw.length!==14){stickyStatus.textContent='❌ CNPJ inválido';stickyStatus.style.color='#991b1b';return;}
    buscarCNPJ(raw);
  });

  return wrap;
}

async function fbDeleteAnaliseEntrada(cnpj, entryKey){
  try{
    var chave=fbHistChaveCnpj(cnpj);
    if(!chave||!entryKey) return false;
    var r=await fetch(FIREBASE_DB+'/'+FIREBASE_HISTORICO_PATH+'/'+chave+'/'+entryKey+'.json',{method:'DELETE'});
    return r.ok;
  }catch(e){return false;}
}

function renderHistoricoCredito(){
  function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt)e.textContent=txt;return e;}
  var wrap=el('div','ac-wrap');

  var headerRow=el('div','');
  headerRow.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;';
  headerRow.appendChild(el('h2','',''));
  headerRow.querySelector('h2').innerHTML='🕓 Histórico de Análises de Crédito';
  headerRow.querySelector('h2').style.cssText='font-size:18px;color:#1a1a1a;margin:0;flex:1;min-width:200px;';
  var buscaInp=document.createElement('input');
  buscaInp.placeholder='Filtrar por CNPJ...';
  buscaInp.style.cssText='padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;min-width:220px;';
  headerRow.appendChild(buscaInp);
  wrap.appendChild(headerRow);

  var listaWrap=el('div','');
  wrap.appendChild(listaWrap);
  listaWrap.innerHTML='<p style="color:#999;font-size:13px">Carregando histórico...</p>';

  function fmtCnpjExibe(c){
    var d=(c||'').replace(/\D/g,'');
    if(d.length!==14) return c||'';
    return d.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
  }

  var todosRegistros=[];

  async function carregar(){
    var todoHist=await fbGetTodoHistoricoAnalise();
    todosRegistros=[];
    if(todoHist){
      Object.entries(todoHist).forEach(function(e){
        var cnpj=e[0],entradas=e[1];
        if(entradas){
          Object.values(entradas).forEach(function(reg){
            todosRegistros.push(Object.assign({cnpjChave:cnpj},reg));
          });
        }
      });
    }
    todosRegistros.sort(function(a,b){return new Date(b.timestamp||0)-new Date(a.timestamp||0);});
    renderLista(todosRegistros);
  }

  function renderLista(registros){
    listaWrap.innerHTML='';
    if(!registros||registros.length===0){
      listaWrap.innerHTML='<p style="color:#999;font-size:13px">Nenhuma análise de crédito registrada ainda.</p>';
      return;
    }
    registros.forEach(function(reg){
      var card=el('div','');
      card.style.cssText='background:#fff;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:10px;overflow:hidden;';
      var head=el('div','');
      head.style.cssText='padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;flex-wrap:wrap;';
      var cor = reg.situacao==='ATIVA' ? '#166534' : '#9a3412';
      head.innerHTML =
        '<span style="font-family:monospace;font-weight:700;color:#1a1a1a;">'+fmtCnpjExibe(reg.cnpjChave)+'</span>'+
        '<span style="font-size:.85em;color:'+cor+';font-weight:600;">'+(reg.situacao||'—')+'</span>'+
        '<span style="font-size:.85em;color:#6b7280;">📅 '+(reg.dataExibicao||'—')+'</span>'+
        '<span style="font-size:.85em;color:#6b7280;">👤 '+(reg.operador||'—')+'</span>';
      var btnCarregar=document.createElement('button');
      btnCarregar.textContent='↩ Carregar';
      btnCarregar.style.cssText='margin-left:auto;background:#2563eb;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:.82em;cursor:pointer;';
      if(!reg.snapshotCliente){
        btnCarregar.disabled=true;btnCarregar.style.opacity='.4';btnCarregar.title='Esta análise é antiga e não possui dados completos para recarregar.';
      } else {
        btnCarregar.onclick=function(e){
          e.stopPropagation();
          // Restaura textos extraídos dos PDFs (salvo no snapshot desde esta versão)
          window._AC_contratoTexto = reg.snapshotContratoTexto || '';
          window._AC_imovelTexto = reg.snapshotImovelTexto || '';
          window._AC_socioDocTexto = reg.snapshotSocioDocTexto || '';
          window._AC = {
            cliente: reg.snapshotCliente || {},
            fornecedores: reg.snapshotFornecedores || [{},{},{}],
            limitesolicitado: reg.snapshotLimiteSolicitado || '',
            exibirResumo: false,
            confirmacoesManuais: reg.confirmacoesManuais || {},
            ultimoResultado: {
              cnpj: reg.cnpjChave,
              registro: reg,
              iaBodyHTML: reg.snapshotIaBodyHTML || '',
              iaLinksHTML: reg.snapshotIaLinksHTML || '',
              socioLinksHTML: reg.snapshotSocioLinksHTML || '',
              stickyStatusHTML: reg.snapshotStickyStatusHTML || '',
              stickyStatusColor: reg.snapshotStickyStatusColor || ''
            }
          };
          STATE.tabCredito='analise';
          render();
        };
      }
      var arrowSpan=document.createElement('span');
      arrowSpan.style.cssText='font-size:.8em;color:#9ca3af;';
      arrowSpan.textContent='▼ ver parecer';
      var btnExcluir=document.createElement('button');
      btnExcluir.textContent='🗑';
      btnExcluir.title='Excluir esta análise do histórico';
      btnExcluir.style.cssText='background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;border-radius:6px;padding:6px 10px;font-size:.82em;cursor:pointer;';
      btnExcluir.onclick=function(e){
        e.stopPropagation();
        if(!confirm('Excluir esta análise do histórico? Esta ação não pode ser desfeita.')) return;
        btnExcluir.disabled=true;btnExcluir.textContent='...';
        // Descobre a chave do registro: procura pelo timestamp
        var cnpjKey=reg.cnpjChave;
        var ts=reg.timestamp;
        fbGetHistoricoAnalise(cnpjKey).then(function(entradas){
          if(!entradas){btnExcluir.textContent='❌';return;}
          var entryKey=null;
          Object.entries(entradas).forEach(function(kv){
            if(kv[1]&&kv[1].timestamp===ts) entryKey=kv[0];
          });
          if(!entryKey){btnExcluir.textContent='❌';return;}
          fbDeleteAnaliseEntrada(cnpjKey,entryKey).then(function(ok){
            if(ok){ card.remove(); } else { btnExcluir.textContent='❌';btnExcluir.disabled=false; }
          });
        });
      };
      head.appendChild(btnCarregar);
      head.appendChild(btnExcluir);
      head.appendChild(arrowSpan);
      var body=el('div','');
      body.style.cssText='display:none;padding:0 16px 16px;border-top:1px solid #f3f4f6;';
      body.innerHTML =
        '<p style="font-size:.85em;color:#374151;margin:12px 0;"><strong>Sócio:</strong> '+(reg.socioNome||'—')+' | <strong>Capital:</strong> R$ '+(reg.capitalSocial||'—')+' | <strong>Tempo de empresa:</strong> '+(reg.tempoEmpresa||'—')+'</p>'+
        (reg.contratoSocialResumo?'<p style="font-size:.85em;color:#166534;margin:8px 0;">📎 '+reg.contratoSocialResumo+'</p>':'')+
        '<div style="background:#fff8eb;border:1px solid #fde68a;border-radius:8px;padding:12px;font-size:.85em;color:#1a1a1a;line-height:1.6;">'+(reg.parecerResumo||'Parecer não registrado.').replace(/\n/g,'<br>')+'</div>';
      head.onclick=function(){
        var aberto = body.style.display==='block';
        body.style.display = aberto?'none':'block';
        arrowSpan.textContent = aberto?'▼ ver parecer':'▲ ocultar parecer';
      };
      card.appendChild(head);card.appendChild(body);
      listaWrap.appendChild(card);
    });
  }

  buscaInp.addEventListener('input',function(){
    var termo=buscaInp.value.replace(/\D/g,'');
    if(!termo){ renderLista(todosRegistros); return; }
    renderLista(todosRegistros.filter(function(r){ return (r.cnpjChave||'').indexOf(termo)>=0; }));
  });

  carregar();
  return wrap;
}

function renderModuloNav(){
  var MODULOS=[
    {id:'frete', icon:'🚛', label:'Frete'},
    {id:'mod2',  icon:'📁', label:'Análise de Crédito'},
    {id:'mod3', icon:'🤖', label:'Ace IA'},
    {id:'mod4',  icon:'📁', label:'Aba 4'}
  ];
  var bar=document.createElement('div');
  bar.style.cssText='background:#2d2d2d;display:flex;align-items:center;gap:2px;padding:0 18px;border-bottom:2px solid #d97706;overflow-x:auto';
  MODULOS.forEach(function(m){
    var btn=document.createElement('button');
    var isActive=STATE.modulo===m.id;
    btn.style.cssText='background:'+(isActive?'#d97706':'transparent')+';color:'+(isActive?'#fff':'#aaaaaa')+';border:none;padding:9px 18px;cursor:pointer;font-size:12px;font-weight:'+(isActive?'800':'500')+';font-family:inherit;border-radius:6px 6px 0 0;white-space:nowrap;transition:background .15s,color .15s;margin-top:4px';
    btn.innerHTML=m.icon+' '+m.label;
    btn.onclick=function(){
      var user=STATE.usuarios&&STATE.usuarios[STATE.loginUser];
      var abas=user&&user.abas;
      if(abas&&abas.length>0&&abas.indexOf(m.id)===-1&&STATE.roleLogado!=='admin'){alert('Voce nao tem acesso a esta aba.');return;}
      STATE.modulo=m.id;
      if(m.id==='frete') STATE.tab='cotacao';
      else if(m.id==='mod2') STATE.tabCredito='analise';
      else STATE.tab=m.id;
      render();
    };
    bar.appendChild(btn);
  });
  return bar;
}

}

function salvarCotacao(){
  var num=STATE.form.numeroCotacao||'';
  if(!num){alert('Informe o Nº da Cotação antes de salvar!'); return;}
  var nova={
    id:num,
    destCity:STATE.form.cidadeDest||'—',
    destUF:STATE.form.ufDest||'—',
    cnpjDest:STATE.form.cnpjDest||'—',
    cepDest:STATE.form.cepDest||'—',
    endDest:STATE.form.endDest||'—',
    valorNF:parseFloat(STATE.form.valorNF)||0,
    volumes:calcTotalVol(),
    peso:parseFloat(STATE.form.pesoTotal)||0,
    nfEmitida:STATE.form.nfEmitida,
    frete:STATE.form.frete||'CIF',
    solicitante:STATE.form.solicitante,
    dataHora:new Date().toLocaleString('pt-BR'),
    produtos:STATE.prods.filter(function(p){return p.nome;}),
    transportadoras:STATE.manRows.filter(function(r){return parseFloat(r.valor)>0;})
  };
  var idx=SAVED.findIndex(function(s){return s.id===num;});
  if(idx>=0){SAVED[idx]=nova;} else {SAVED.unshift(nova);}
  // Mantém máximo 30 cotações
  if(SAVED.length>30) SAVED.splice(30);

function imprimirCotacao(){
  // Usa dados atuais do STATE
  var num=STATE.form.numeroCotacao||'';
  if(!num){alert('Nenhuma cotação carregada para imprimir!'); return;}
  var resumoTxt=calcResumo();
  var transLines=STATE.manRows.filter(function(r){return parseFloat(r.valor)>0;}).map(function(r){
    var v=parseFloat(r.valor)||0,o=parseFloat(r.outros)||0,cr=parseFloat(r.credito)||0,l=parseFloat(r.lucro)||0;
    var vc=(v+o)*(1+cr/100)*(1+l/100);
    return '<tr><td>'+r.nome+'</td><td>'+r.tel+'</td><td>'+r.cotacao+'</td><td>'+r.prazo+' d.u.</td><td>'+fmtBRL(v)+'</td><td>'+fmtBRL(vc)+'</td></tr>';
  }).join('');
  var prodLines=STATE.prods.filter(function(p){return p.nome;}).map(function(p){
    return '<tr><td>'+p.nome+'</td><td style="text-align:center">'+p.vol+'</td><td>'+p.dim+'</td></tr>';
  }).join('');
  var win=window.open('','_blank');
  var dt=new Date().toLocaleString('pt-BR');

function renderNav(){
  var tabs=[{id:'cotacao',icon:'📋',l:'Cotação Frete'},{id:'salvas',icon:'🗂️',l:'Cotações Salvas'},{id:'transportadoras',icon:'🚛',l:'Transportadoras'},{id:'embalagens',icon:'📦',l:'Embalagens'},{id:'extensao',icon:'🧩',l:'Extensão'}];
  var nav=document.createElement('nav');
  tabs.forEach(function(t){
    var btn=document.createElement('button');
    btn.className='tab'+(STATE.tab===t.id?' active':'');
    btn.textContent=t.icon+' '+t.l;
    btn.onclick=function(){
      // Preserva form values antes de trocar aba
      var inputs=document.querySelectorAll('.inp[data-form]');
      inputs.forEach(function(el){ STATE.form[el.dataset.form]=el.value; });
      STATE.tab=t.id;
      render();
    };
    nav.appendChild(btn);
  });
  // Botões de ação dentro da aba Frete
  var actions=document.createElement('div');
  actions.style.cssText='margin-left:auto;display:flex;gap:8px;align-items:center;padding:4px 0';
  var bNova=document.createElement('button');
  bNova.style.cssText='background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff;border:none;padding:5px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit';
  bNova.textContent='✦ Nova Cotação';
  bNova.onclick=function(){
    if(confirm('Iniciar nova cotação? Os dados atuais serão apagados.')){
      STATE.form=Object.assign({},INIT);
      STATE.prods=[{nome:'',vol:0,dim:'',cabe:''}];
      STATE.manRows=[];
      STATE.tab='cotacao';
      STATE.modulo='frete';
      render();
    }
  };
  var bSalv=document.createElement('button');
  bSalv.style.cssText='background:linear-gradient(135deg,#059669,#34d399);color:#fff;border:none;padding:5px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit';
  bSalv.textContent='💾 Salvar';
  bSalv.onclick=function(){ salvarCotacao(); };
  var bPrint=document.createElement('button');
  bPrint.id='btnImprimirHdr';
  bPrint.style.cssText='background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;border:none;padding:5px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit';
  bPrint.textContent='🖨️ Imprimir';
  bPrint.onclick=function(){ imprimirCotacao(); };
  actions.appendChild(bNova);
  actions.appendChild(bSalv);
  actions.appendChild(bPrint);
  nav.appendChild(actions);
  return nav;
}

// ── COTAÇÃO ──────────────────────────────
function renderCotacao(){
  var wrap=document.createElement('div');
  wrap.style.cssText='width:100%;min-width:0';
  if(window._blingImport){
    var _bd=window._blingImport; window._blingImport=null;
    // Preencher automaticamente após 400ms
    setTimeout(function(){
      preencherDoBling(_bd);
      // Mostrar notificação de sucesso
      var banner=document.createElement('div');
      banner.style.cssText='position:fixed;top:62px;left:50%;transform:translateX(-50%);background:#059669;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.25);pointer-events:none';
      banner.innerHTML='\u2705 Or\u00e7amento Bling N\u00ba <b>'+(_bd.n||'?')+'<\/b> preenchido automaticamente!';
      document.body.appendChild(banner);
      setTimeout(function(){if(banner.parentNode)banner.remove();},5000);
    },400);
  }
  // Linha 1: Remetente | Destinatário
  var row1=document.createElement('div');
  row1.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;min-width:0;width:100%;align-items:stretch';
  row1.appendChild(renderSecRemetente());
  row1.appendChild(renderSecDestinatario());
  wrap.appendChild(row1);
  // Linha 2: Info do Pedido | Produtos
  var row2=document.createElement('div');
  row2.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;min-width:0;width:100%;align-items:stretch';
  row2.appendChild(renderSecPedido());
  row2.appendChild(renderSecProdutos());
  wrap.appendChild(row2);
  // Linha 3: Cotação Manual (largura total, isolada)
  var manWrap=document.createElement('div');
  manWrap.style.cssText='width:100%;min-width:0;overflow:hidden;margin-bottom:14px';
  manWrap.appendChild(renderCotManual());
  wrap.appendChild(manWrap);
  // Linha 4: Resumo (largura total)
  var resWrap=document.createElement('div');
  resWrap.style.cssText='width:100%;min-width:0;overflow:hidden';
  resWrap.appendChild(renderSecResumo());
  wrap.appendChild(resWrap);
  return wrap;
}

// Shared helper - defined once
function mkFieldG(lbl,val,ro,type,ph,onChange){
  var el=inp(val,'',ro,type,ph);
  if(ro) el.classList.add('inp-ro');
  if(onChange) el.oninput=function(){STATE.form[onChange]=this.value; updateResumo();};
  return field(lbl,el);
}
function mkSelG(lbl,val,opts,onChange){
  var el=sel(val,opts);
  el.onchange=function(){
    STATE.form[onChange]=this.value;
    if(onChange==='ufDest'){STATE.manRows=getManRows(this.value);updateManTable();}
    updateResumo();
  };
  return field(lbl,el);
}

function calcTotalVol(){return STATE.prods.reduce(function(s,p){return s+(parseInt(p.vol)||0);},0);}
function calcCubagem(){
  // Lista cada produto com sua quantidade de volumes e dimensão
  var linhas = STATE.prods.filter(function(p){return p.nome&&p.vol>0;}).map(function(p){
    return (parseInt(p.vol)||1)+' VOL ('+( p.dim||'—')+')';
  });
  return linhas.length ? linhas.join(', ') : '—';
}
function calcResumo(){
  var f=STATE.form;
  // Pagador: CIF = remetente, FOB = destinatario
  var pagador = (f.frete==='FOB') ? (f.cnpjDest||'—') : f.cnpjRem;
  // Tipo de material: somente os 6 primeiros produtos
  var todosProds = STATE.prods.filter(function(p){return p.nome;});
  var primeiros6 = todosProds.slice(0,6).map(function(p){return p.nome;});
  var tipoMat = primeiros6.length ? primeiros6.join(', ') : '—';
  if(todosProds.length>6) tipoMat += ' e mais '+(todosProds.length-6)+' item(s)';
  return [
    '* Nº Cotação: '+(f.numeroCotacao||'—'),
    '* CNPJ do pagador do frete: '+pagador,
    '* CNPJ do remetente: '+f.cnpjRem,
    '* CNPJ do destinatário: '+(f.cnpjDest||'—'),
    '* Frete: '+(f.frete||'CIF'),
    '* CEP de origem: '+f.cepOrig.replace(/-/g,''),
    '* CEP de destino: '+(f.cepDest.replace(/-/g,'')||'—'),
    '* Tipo de material: '+tipoMat,
    '* Valor da nota fiscal: '+fmtBRL(f.valorNF),
    '* Quantidade de volumes: '+calcTotalVol(),
    '* Peso total: '+(f.pesoTotal||0)+' kg',
    '* Cubagem: '+calcCubagem()
  ].join('\n');
}

function renderProdsTable(){
  var tblWrap=document.createElement('div'); tblWrap.className='tbl-wrap'; tblWrap.id='prodsTable';
  var tbl=document.createElement('table');
  tbl.innerHTML='<thead><tr><th style="width:40%">Produto</th><th>Vol.</th><th>Dimensão (Comp x Larg x Alt)</th><th>Un/Vol</th><th></th></tr></thead>';
  var tbody=document.createElement('tbody');
  if(!STATE.prods||!STATE.prods.length){ tblWrap.appendChild(tbl); return tblWrap; }
  STATE.prods.forEach(function(p,i){
    var tr=document.createElement('tr');
    // produto select
    var tdP=document.createElement('td');
    var selEl=document.createElement('select'); selEl.className='inp'; selEl.style.fontSize='11px';
    var optBlank=document.createElement('option'); optBlank.value=''; optBlank.textContent='-- Selecione --';
    selEl.appendChild(optBlank);
    EMBALAGENS.forEach(function(e){
      var o=document.createElement('option'); o.value=e.n; o.textContent=e.n;
      if(e.n===p.nome) o.selected=true;
      selEl.appendChild(o);
    });
    selEl.onchange=function(){
      STATE.prods[i].nome=this.value;
      var val=this.value;
      var emb=EMBALAGENS.find(function(e){return e.n===val;});
      if(emb){STATE.prods[i].dim=emb.d; STATE.prods[i].cabe=emb.c;}
      // Atualiza só a tabela de produtos e o resumo, sem render() completo
      var tbl=document.getElementById('prodsTable');
      if(tbl){tbl.innerHTML=''; var nt=renderProdsTable(); while(nt.firstChild) tbl.appendChild(nt.firstChild);}
      updateVolTotal(); updateResumo();
    };
    tdP.appendChild(selEl); tr.appendChild(tdP);
    // vol
    var tdV=document.createElement('td');
    var inpV=document.createElement('input'); inpV.className='inp'; inpV.type='number'; inpV.min='1'; inpV.value=p.vol; inpV.style.width='55px';
    inpV.oninput=function(){STATE.prods[i].vol=parseInt(this.value)||1; updateVolTotal(); updateResumo();};
    tdV.appendChild(inpV); tr.appendChild(tdV);
    // dim
    var tdD=document.createElement('td'); tdD.className='tag-blue'; tdD.style.fontSize='11px'; tdD.textContent=p.dim||'—'; tr.appendChild(tdD);
    // cabe
    var tdC=document.createElement('td'); tdC.className='tag-muted'; tdC.style.fontSize='11px'; tdC.textContent=p.cabe||'—'; tr.appendChild(tdC);
    // del
    var tdX=document.createElement('td');
    var btnX=document.createElement('button'); btnX.className='btn-del'; btnX.textContent='✕';
    btnX.onclick=function(){
      STATE.prods.splice(i,1);
      var tbl=document.getElementById('prodsTable');
      if(tbl){tbl.innerHTML=''; var nt=renderProdsTable(); while(nt.firstChild) tbl.appendChild(nt.firstChild);}
      updateVolTotal(); updateResumo();
    };
    tdX.appendChild(btnX); tr.appendChild(tdX);
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody); tblWrap.appendChild(tbl);
  return tblWrap;
}

function buildPhoneCell(tel, nome){

    a.href=url; a.target='_blank';

    td.appendChild(a);
  } else {
    var digits=tel.replace(/\D/g,'');
    if(digits.length===10||digits.length===11){ digits='55'+digits; }
    var waUrl='https://wa.me/'+digits+'?text=Ol%C3%A1%2C+gostaria+de+solicitar+uma+cota%C3%A7%C3%A3o+de+frete.';
    var a=document.createElement('a');

    a.textContent='📲 WhatsApp';

function gerarMensagemWA(){
  var f=STATE.form;
  var hora=new Date().getHours();
  var saud=hora<12?'Bom dia':hora<18?'Boa tarde':'Boa noite';
  var resumo=calcResumo();
  var msg=saud+'! Sou da *Mais Acessível* e gostaria de solicitar uma cotação de frete. Seguem os dados abaixo:\n\n'+resumo;
  return msg;
}

function enviarParaSelecionadas(){
  var selecionadas=STATE.manRows.filter(function(r,i){
    var cb=document.getElementById('chk-trans-'+i);
    return cb && cb.checked;
  });
  if(!selecionadas.length){
    alert('Selecione pelo menos uma transportadora para enviar!');
    return;
  }
  // Filtrar apenas as que têm WhatsApp
  var comWA=selecionadas.filter(function(r){
    var tel=(r.tel||'').replace(/\D/g,'');
    return tel && tel.length>=8 && r.tel.toUpperCase()!=='SITE';
  });
  if(!comWA.length){
    alert('Nenhuma transportadora selecionada tem número de WhatsApp. Transportadoras com "SITE" precisam ser cotadas pelo site delas.');
    return;
  }
  // Mostrar painel de fila
  STATE._waFila=comWA.slice();
  STATE._waIdx=0;
  STATE._waMsg=gerarMensagemWA();
  mostrarPainelWA();
}

function mostrarPainelWA(){
  // Remove painel anterior se existir
  var old=document.getElementById('painelWA');
  if(old) old.remove();

  var fila=STATE._waFila;
  var idx=STATE._waIdx;
  if(idx>=fila.length){
    // Todos enviados
    var fim=document.getElementById('painelWA');

function buildManTable(){
  if(!STATE.manRows || !Array.isArray(STATE.manRows)) STATE.manRows=[];
  var tbl=document.createElement('table');
  tbl.style.cssText='width:100%;border-collapse:collapse;min-width:900px';
  tbl.innerHTML='<thead><tr><th style="text-align:center;width:32px"><input type="checkbox" id="chkAll" title="Selecionar todas" style="width:15px;height:15px;cursor:pointer;accent-color:#059669"></th><th>Nº</th><th>Transportadora</th><th>Tipo</th><th style="text-align:center">Tri.</th><th>Contato</th><th>Cotação</th><th>Prazo</th><th>Valor</th><th>Outros</th><th>Crédito%</th><th>Lucro%</th><th style="color:#059669">Valor Cobrar</th></tr></thead>';
  // Selecionar todos
  setTimeout(function(){
    var chkAll=document.getElementById('chkAll');
    if(chkAll) chkAll.onchange=function(){
      STATE.manRows.forEach(function(_,i){
        var cb=document.getElementById('chk-trans-'+i);
        if(cb) cb.checked=chkAll.checked;
      });
    };
  },100);
  var tbody=document.createElement('tbody');
  STATE.manRows.forEach(function(r,i){
    var val=parseFloat(r.valor)||0;
    var out=parseFloat(r.outros)||0;
    var cred=parseFloat(r.credito)||0;
    var luc=parseFloat(r.lucro)||0;
    // Fórmula: ((Valor + Outros) * (1 + Credito/100)) * (1 + Lucro/100)
    var vc=val>0 ? (val+out)*(1+cred/100)*(1+luc/100) : 0;
    var has=val>0;
    var tr=document.createElement('tr');
    if(has) tr.className='hit';
    var rTipo=r.tipo||'';
    var rTipColor=rTipo==='AEREO'?'#d97706':rTipo==='FRETE'?'#059669':rTipo.includes('VIA')?'#2563eb':'#888';
    var rIsTri=r.triangulacao===true||r.triangulacao==='true'||r.triangulacao==='Sim';
    var temWA=r.tel&&r.tel!==''&&r.tel.toUpperCase()!=='SITE';
    tr.innerHTML='<td style="text-align:center;padding:6px 4px"><input type="checkbox" id="chk-trans-'+i+'" '+(temWA?'':'disabled title="Sem WhatsApp"')+' style="width:15px;height:15px;cursor:'+(temWA?'pointer':'not-allowed')+';accent-color:#059669;opacity:'+(temWA?'1':'0.3')+'" /></td>'+
      '<td class="tag-muted">'+r.nr+'</td>'+
      '<td style="font-weight:'+(has?700:400)+';color:'+(has?'#059669':'#1a1a1a')+';font-size:11px;white-space:nowrap">'+r.nome+'</td>'+
      '<td style="font-size:11px;font-weight:600;white-space:nowrap;color:'+rTipColor+'">'+rTipo+'</td>'+
      '<td style="text-align:center">'+(rIsTri?'<span style="color:#059669;font-weight:700;font-size:14px">✓</span>':'')+'</td>';
    tr.appendChild(buildPhoneCell(r.tel, r.nome));
    function mkTdInp(val,w,type,field){
      var td=document.createElement('td');
      var el=document.createElement('input'); el.className='inp'; el.value=val||''; el.style.width=w+'px'; el.style.fontSize='11px';
      if(type) el.type=type;
      el.oninput=function(){STATE.manRows[i][field]=this.value;};
      el.onblur=function(){STATE.manRows[i][field]=this.value; rebuildManRow(i);};
      td.appendChild(el); return td;
    }
    tr.appendChild(mkTdInp(r.cotacao,82,'text','cotacao'));
    tr.appendChild(mkTdInp(r.prazo,44,'text','prazo'));
    tr.appendChild(mkTdInp(r.valor,78,'number','valor'));
    tr.appendChild(mkTdInp(r.outros||'',68,'number','outros'));
    tr.appendChild(mkTdInp(r.credito||'',58,'number','credito'));
    tr.appendChild(mkTdInp(r.lucro,46,'number','lucro'));
    var tdVc=document.createElement('td'); tdVc.style.cssText='font-weight:700;color:'+(has?'#059669':'#888'); tdVc.textContent=has?fmtBRL(vc):'—';
    tr.appendChild(tdVc);
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  return tbl;
}
function rebuildManRow(i){
  var wrap=document.getElementById('manTableWrap');
  if(wrap){wrap.innerHTML=''; wrap.appendChild(buildManTable());}
}

function renderSalvas(){
  var wrap=document.createElement('div');
  // Barra de busca
  var searchBar=document.createElement('div'); searchBar.style.cssText='display:flex;gap:10px;margin-bottom:14px;align-items:center';

  var cnt=document.createElement('span'); cnt.style.cssText='color:#888;font-size:12px';
  cnt.textContent=SAVED.length+' cotação(ões) salva(s) — máx. 30';

  wrap.appendChild(searchBar);

    listEl.innerHTML='';

      listEl.innerHTML='<div style="padding:20px;text-align:center;color:#888;font-size:13px">Nenhuma cotação encontrada.</div>';
      return;
    }
    dados.forEach(function(c,ci){
      var best=c.transportadoras&&c.transportadoras.filter(function(t){return t.valor>0;}).sort(function(a,b){return a.valor-b.valor;})[0];
      var item=document.createElement('div');
      item.style.cssText='background:#fff;border:1.5px solid #c8c8c4;border-radius:10px;margin-bottom:8px;overflow:hidden';

      var arrow=document.createElement('span'); arrow.textContent='▶'; arrow.style.cssText='color:#d97706;font-size:11px;transition:transform .2s;flex-shrink:0';
      var badge=document.createElement('span'); badge.style.cssText='background:#fff8eb;color:#92400e;border:1px solid #fde68a;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;flex-shrink:0';
      badge.textContent='Nº '+c.id;
      var title=document.createElement('span'); title.style.cssText='font-weight:700;font-size:13px;flex:1';
      title.textContent=(c.destCity||'—')+' — '+(c.destUF||'—');
      var sub=document.createElement('span'); sub.style.cssText='font-size:11px;color:#888;white-space:nowrap';
      sub.textContent=(c.dataHora||'')+' | '+fmtBRL(c.valorNF);
      var btnCarregar=document.createElement('button'); btnCarregar.className='btn-ok'; btnCarregar.textContent='↩ Carregar';
      btnCarregar.onclick=function(e){
        e.stopPropagation();
        STATE.form=Object.assign({},INIT,{cnpjDest:c.cnpjDest,cepDest:c.cepDest,cidadeDest:c.destCity,ufDest:c.destUF,endDest:c.endDest,valorNF:String(c.valorNF),pesoTotal:String(c.peso),nfEmitida:c.nfEmitida,solicitante:c.solicitante,numeroCotacao:c.id,frete:c.frete||'CIF'});
        STATE.prods=(c.produtos||[]).map(function(p){return{nome:p.nome||'',vol:p.vol||1,dim:p.dim||'',cabe:p.cabe||''};});
        if(!STATE.prods.length) STATE.prods=[{nome:'',vol:0,dim:'',cabe:''}];
        // Carregar TODAS as transportadoras do estado, mesclando valores já salvos
        var uf=c.destUF||'';
        var todasDoEstado=getManRows(uf);
        var savedMap={};
        (c.transportadoras||[]).forEach(function(t){savedMap[(t.nome||'').toUpperCase()]=t;});
        STATE.manRows=todasDoEstado.map(function(r){
          var saved=savedMap[(r.nome||'').toUpperCase()];
          if(saved){
            return Object.assign({},r,{
              cotacao:saved.cotacao||'',prazo:saved.prazo||'',valor:saved.valor||'',
              outros:saved.outros||'',credito:saved.credito||'',lucro:saved.lucro||''
            });
          }
          return r;
        });
        STATE.tab='cotacao'; STATE.modulo='frete'; render();
      };
      hdr.appendChild(arrow); hdr.appendChild(badge); hdr.appendChild(title); hdr.appendChild(sub); hdr.appendChild(btnCarregar);
      item.appendChild(hdr);

      // Body (colapsado por padrão)
      var body=document.createElement('div');
      body.style.cssText='display:none;padding:12px 14px;border-top:1px solid #e8e8e6';

      // Stats
      var stats=document.createElement('div'); stats.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px';
      [['Valor NF',fmtBRL(c.valorNF)],['Volumes',(c.volumes||0)+' vol'],['Peso',(c.peso||0)+' kg'],['NF Emitida',c.nfEmitida||'—']].forEach(function(kv){
        var d=document.createElement('div'); d.style.cssText='background:#f3f3f1;border-radius:5px;padding:5px 9px';
        d.innerHTML='<span class="lbl" style="margin:0">'+kv[0]+'</span><div style="font-size:12px;font-family:monospace;font-weight:600;margin-top:2px">'+kv[1]+'</div>';
        stats.appendChild(d);
      });
      body.appendChild(stats);

      // Produtos
      if(c.produtos&&c.produtos.length){
        var pTitle=document.createElement('div'); pTitle.style.cssText='font-size:11px;font-weight:700;text-transform:uppercase;color:#888;margin-bottom:4px'; pTitle.textContent='Produtos';
        body.appendChild(pTitle);
        c.produtos.forEach(function(p){
          var d=document.createElement('div'); d.style.cssText='display:flex;gap:8px;font-size:11px;font-family:monospace;padding:3px 0;border-bottom:1px solid #e8e8e6';

          body.appendChild(d);
        });
      }

      // Melhor cotação
      if(best){
        var bb=document.createElement('div'); bb.className='best-box'; bb.style.marginTop='8px';
        var v=parseFloat(best.valor)||0,o=parseFloat(best.outros)||0,cr=parseFloat(best.credito)||0,l=parseFloat(best.lucro)||0;
        var vc=v>0?(v+o)*(1+cr/100)*(1+l/100):0;
        bb.innerHTML='<div style="font-size:10px;color:#059669;font-weight:700;text-transform:uppercase;margin-bottom:3px">✓ Melhor Cotação</div>'+
          '<div class="tag-green fw700 f14" style="font-family:monospace">'+best.nome+' — '+fmtBRL(vc)+'</div>'+
          '<div class="tag-muted" style="font-size:11px;margin-top:2px">Cotação #'+best.cotacao+' · Prazo: '+best.prazo+' d.u.</div>';
        body.appendChild(bb);
      }
      item.appendChild(body);

      // Toggle accordion
      hdr.onclick=function(){
        var open=body.style.display==='block';
        body.style.display=open?'none':'block';
        arrow.textContent=open?'▶':'▼';
        arrow.style.transform=open?'rotate(0)':'rotate(0)';
      };
      listEl.appendChild(item);
    });
  }

  buildList('');
  srchBtn.onclick=function(){buildList(srch.value.trim());};
  srch.onkeydown=function(e){if(e.key==='Enter')buildList(srch.value.trim());};
  srch.oninput=function(){if(!this.value)buildList('');};
  return wrap;
}

function preencherDoBling(bd) {
  // CNPJ formatado
  if(bd.c){
    var v=bd.c.replace(/\D/g,'');
    if(v.length===14) v=v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
    else if(v.length===11) v=v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4');
    STATE.form.cnpjDest=v;
  }
  // Número cotação
  if(bd.n && !STATE.form.numeroCotacao) STATE.form.numeroCotacao=String(bd.n);
  // Valor NF
  if(bd.vi||bd.v){
    var vStr=String(bd.vi||bd.v);
    if(vStr.includes(',')&&vStr.includes('.')) vStr=vStr.replace(/\./g,'').replace(',','.');
    else if(vStr.includes(',')) vStr=vStr.replace(',','.');
    STATE.form.valorNF=vStr;
  }
  // Peso: não preenche automaticamente — usuário informa manualmente
  // if(bd.kg) STATE.form.pesoTotal=String(bd.kg);
  // Frete: freteModalidade 0=CIF, 1=FOB
  if(bd.ft) STATE.form.frete=bd.ft;
  if(bd.freteModalidade!==undefined){
    STATE.form.frete=(bd.freteModalidade===0||bd.freteModalidade==='0')?'CIF':'FOB';
  }
  // Volumes: não preenche automaticamente — usuário informa manualmente
  // if(bd.vol) STATE.form.volTotal=String(bd.vol);
  // Endereço destino
  if(bd.endE && bd.endE.length>3) STATE.form.endDest=bd.endE;
  else if(bd.end) STATE.form.endDest=bd.end;
  // Solicitante = Vendedor
  if(bd.vend) STATE.form.solicitante=bd.vend;

  // ── PRODUTOS: cruza itens do Bling com EMBALAGENS cadastradas ──
  STATE.prods=[];
  if(bd.itens && bd.itens.length>0){
    bd.itens.forEach(function(item){
      var nomeProd=(item.produto&&item.produto.descricao)||item.descricao||'';
      var codigoProd=item.codigo||'';
      // Busca na lista de embalagens cadastradas (por nome ou codigo)
      var emb=null;
      for(var i=0;i<EMBALAGENS.length;i++){
        var e=EMBALAGENS[i];
        var nomeEmb=(e.n||'').toUpperCase();
        var nomeBling=nomeProd.toUpperCase();
        var codBling=codigoProd.toUpperCase();
        // Match por nome (contém) ou por código
        if(nomeBling && (nomeEmb===nomeBling || nomeEmb.includes(nomeBling) || nomeBling.includes(nomeEmb))){
          emb=e; break;
        }
        if(codBling && e.cod && e.cod.toUpperCase()===codBling){
          emb=e; break;
        }
      }
      // Só adiciona linha se encontrou embalagem com dimensões cadastradas
      if(emb){
        STATE.prods.push({
          nome: emb.n,
          vol: item.quantidade||1,
          dim: emb.d||'—',
          cabe: emb.c||1
        });
      }
    });
  }

  STATE.tab='cotacao';
  STATE.modulo='frete';
  render();

  // CEP → dispara ViaCEP
  if(bd.p){
    var cepRaw=bd.p.replace(/\D/g,'');
    STATE.form.cepDest=cepRaw.replace(/(\d{5})(\d{3})/,'$1-$2');
    var tentativas=0;
    var tentarCEP=function(){
      var el=document.getElementById('cepDestEl');
      if(el){
        el.value=cepRaw.replace(/(\d{5})(\d{3})/,'$1-$2');
        el.dispatchEvent(new Event('input',{bubbles:true}));
      } else if(tentativas<10){
        tentativas++;
        setTimeout(tentarCEP, 200);
      }
    };
    setTimeout(tentarCEP, 500);
  }
}

function renderAceIA(){
  var wrap=document.createElement('div');

  // Titulo
  var h=document.createElement('h2');
  h.style.cssText='font-size:16px;color:#b45309;margin-bottom:4px;padding-bottom:8px;border-bottom:2px solid #f59e0b;display:flex;align-items:center;gap:8px';
  h.style.cssText='font-size:16px;color:#b45309;margin-bottom:4px;padding-bottom:8px;border-bottom:2px solid #f59e0b;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap';
  h.innerHTML='<span>🤖 Ace IA <span style="font-size:11px;font-weight:400;color:#888;background:#fff8eb;border:1px solid #fde68a;border-radius:10px;padding:2px 10px">Painel de Gerenciamento</span></span><a href="https://maisacessivel-chatbot.onrender.com" target="_blank" style="padding:8px 18px;background:#FF6B00;color:#fff;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;white-space:nowrap">💬 Abrir o Ace</a>';
  wrap.appendChild(h);

  // Sub-tabs
  var subTabs=[
    {id:'instrucoes',icon:'📝',label:'Instruções'},
    {id:'leads',icon:'👥',label:'Leads'},
    {id:'respostas',icon:'⚡',label:'Respostas Rápidas'},
    {id:'config',icon:'⚙️',label:'Configurações'},
    {id:'configurar',icon:'🧠',label:'Configurar com IA'},
    {id:'historico',icon:'🕐',label:'Histórico'}
  ];
  var subAtiva='instrucoes';
  var tabBar=document.createElement('div');
  tabBar.style.cssText='display:flex;gap:4px;margin:16px 0 20px;border-bottom:2px solid #f0f0f0;padding-bottom:0';
  var contentArea=document.createElement('div');

  function renderSubTab(){
    contentArea.innerHTML='';
    tabBar.querySelectorAll('button').forEach(function(b){
      var active=b.dataset.id===subAtiva;
      b.style.cssText='padding:8px 16px;border:none;border-bottom:'+(active?'2px solid #d97706':'2px solid transparent')+';background:transparent;color:'+(active?'#b45309':'#888')+';font-weight:'+(active?'700':'400')+';font-size:12px;cursor:pointer;font-family:inherit;margin-bottom:-2px';
    });
    if(subAtiva==='instrucoes') contentArea.appendChild(renderInstrucoes());
    else if(subAtiva==='leads') contentArea.appendChild(renderLeads());
    else if(subAtiva==='respostas') contentArea.appendChild(renderRespostas());
    else if(subAtiva==='config') contentArea.appendChild(renderConfigAce());
    else if(subAtiva==='configurar') contentArea.appendChild(renderConfigurarComIA());
    else if(subAtiva==='historico') contentArea.appendChild(renderHistoricoConfig());
  }

  subTabs.forEach(function(t){
    var btn=document.createElement('button');
    btn.dataset.id=t.id;
    btn.innerHTML=t.icon+' '+t.label;
    btn.onclick=function(){subAtiva=t.id;renderSubTab();};
    tabBar.appendChild(btn);
  });
  wrap.appendChild(tabBar);
  wrap.appendChild(contentArea);
  // Sincronizar configs com servidor ao abrir o painel
  var cfgAtual=aceLoadConfig();
  var rrAtual=aceLoadRespostas();
  cfgAtual.respostas=rrAtual;
  aceSyncConfig(cfgAtual);
  renderSubTab();
  return wrap;
}

function renderInstrucoes(){
  var div=document.createElement('div');
  var cfg=aceLoadConfig();

  function card(title,content){
    var c=document.createElement('div');
    c.style.cssText='background:#fff;border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1.5px solid #e5e7eb';
    var h=document.createElement('div');
    h.style.cssText='font-size:12px;font-weight:700;color:#92400e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px';
    h.textContent=title;
    c.appendChild(h);
    c.appendChild(content);
    return c;
  }

  // Instrucoes gerais
  var txtP=document.createElement('textarea');
  txtP.style.cssText='width:100%;height:130px;border:1.5px solid #d1d5db;border-radius:7px;padding:10px;font-size:13px;font-family:inherit;resize:vertical;outline:none;line-height:1.6';
  txtP.placeholder='Ex: O Ace deve sempre pedir nome e WhatsApp. Não deve falar sobre preços sem consultar a equipe. Deve ser simpático e objetivo...';
  txtP.value=cfg.instrucoes||'';
  div.appendChild(card('📝 Instruções Gerais do Ace',txtP));

  // Tom de voz
  var selTom=document.createElement('select');
  selTom.style.cssText='width:100%;padding:9px;border:1.5px solid #d1d5db;border-radius:7px;font-size:13px;font-family:inherit';
  selTom.innerHTML='<option value="formal">Formal e Profissional</option><option value="amigavel">Amigável e Descontraído</option><option value="tecnico">Técnico e Detalhado</option>';
  selTom.value=cfg.tom||'amigavel';
  div.appendChild(card('🎙️ Tom de Voz',selTom));

  // Dados da empresa
  var gridEmp=document.createElement('div');
  gridEmp.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px';
  function inpCfg(ph,val){
    var i=document.createElement('input');
    i.type='text';i.placeholder=ph;i.value=val||'';
    i.style.cssText='width:100%;padding:9px;border:1.5px solid #d1d5db;border-radius:7px;font-size:13px;font-family:inherit;outline:none';
    return i;
  }
  var iWhats=inpCfg('WhatsApp ex: 5562...',cfg.whatsapp||'556235173971');
  var iSite=inpCfg('Site',cfg.site||'maisacessivel.com.br');
  var iEnde=inpCfg('Endereço completo',cfg.endereco||'Goiânia, GO');
  var iHora=inpCfg('Horário ex: Seg-Sex 8h-18h',cfg.horario||'');
  var iEmail=inpCfg('E-mail',cfg.email||'');
  var iCnpj=inpCfg('CNPJ',cfg.cnpj||'');
  var iRazao=inpCfg('Razão Social',cfg.razaoSocial||'');
  var iCidade=inpCfg('Cidade / UF',cfg.cidade||'Goiânia / GO');
  var iCep=inpCfg('CEP',cfg.cep||'');
  var iTelFixo=inpCfg('Telefone fixo',cfg.telFixo||'');
  var iInsta=inpCfg('Instagram',cfg.instagram||'');
  var iFace=inpCfg('Facebook',cfg.facebook||'');
  var iDesc=document.createElement('textarea');
  iDesc.placeholder='Descrição da empresa (quem somos, missão, diferenciais...)';
  iDesc.value=cfg.descricao||'';
  iDesc.style.cssText='width:100%;padding:9px;border:1.5px solid #d1d5db;border-radius:7px;font-size:13px;font-family:inherit;outline:none;grid-column:1/-1;height:70px;resize:vertical';
  gridEmp.appendChild(iWhats);gridEmp.appendChild(iSite);
  gridEmp.appendChild(iEnde);gridEmp.appendChild(iHora);
  gridEmp.appendChild(iEmail);gridEmp.appendChild(iCnpj);
  gridEmp.appendChild(iRazao);gridEmp.appendChild(iCidade);
  gridEmp.appendChild(iCep);gridEmp.appendChild(iTelFixo);
  gridEmp.appendChild(iInsta);gridEmp.appendChild(iFace);
  gridEmp.appendChild(iDesc);
  div.appendChild(card('🏢 Dados da Empresa',gridEmp));

  // Palavras proibidas
  var txtProib=document.createElement('textarea');
  txtProib.style.cssText='width:100%;height:70px;border:1.5px solid #d1d5db;border-radius:7px;padding:10px;font-size:13px;font-family:inherit;resize:vertical;outline:none';
  txtProib.placeholder='Ex: concorrente, barato, desconto, não temos...';
  txtProib.value=(cfg.proibidas||[]).join(', ');
  div.appendChild(card('🚫 Palavras Proibidas (separadas por vírgula)',txtProib));

  // Botao salvar
  var btnSave=document.createElement('button');
  btnSave.innerHTML='💾 Salvar Todas as Instruções';
  btnSave.style.cssText='width:100%;padding:12px;background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit';
  btnSave.onclick=function(){
    cfg.instrucoes=txtP.value;
    cfg.tom=selTom.value;
    cfg.whatsapp=iWhats.value;
    cfg.site=iSite.value;
    cfg.endereco=iEnde.value;
    cfg.horario=iHora.value;
    cfg.proibidas=txtProib.value.split(',').map(function(s){return s.trim();}).filter(Boolean);
    aceSaveConfig(cfg);
    btnSave.innerHTML='✅ Salvo!';
    setTimeout(function(){btnSave.innerHTML='💾 Salvar Todas as Instruções';},2000);
  };
  div.appendChild(btnSave);
  return div;
}

function renderLeads(){
  var div=document.createElement('div');
  // Buscar leads do servidor
  fetch('https://maisacessivel-chatbot.onrender.com/leads').then(function(r){return r.json();}).then(function(serverLeads){
    if(serverLeads&&serverLeads.length>0){localStorage.setItem('ace_leads',JSON.stringify(serverLeads));}
  }).catch(function(){});
  var leads=aceLoadLeads();

  var header=document.createElement('div');
  header.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:16px';
  header.innerHTML='<span style="font-size:13px;color:#666">Total: <b>'+leads.length+'</b> leads capturados</span>';
  var btnExp=document.createElement('button');
  btnExp.innerHTML='📥 Exportar CSV';
  btnExp.style.cssText='padding:7px 14px;background:#059669;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600';
  btnExp.onclick=function(){
    var csv='Nome,WhatsApp,Interesse,Data\n';
    leads.forEach(function(l){csv+='"'+l.nome+'","'+l.whatsapp+'","'+l.interesse+'","'+l.data+'"\n';});
    var a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download='leads_ace_'+new Date().toISOString().slice(0,10)+'.csv';
    a.click();
  };
  header.appendChild(btnExp);
  div.appendChild(header);

  if(leads.length===0){
    var empty=document.createElement('div');
    empty.style.cssText='text-align:center;padding:40px;color:#999;background:#fff;border-radius:10px;border:1.5px dashed #e5e7eb';

}

function renderConfigurarComIA(){

  card.style.cssText='background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1.5px solid #e5e7eb';

  var msgs=document.createElement('div');
