<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mais Acessível App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f7f7f5;color:#1a1a1a;font-size:15px}
input,select{outline:none;font-family:inherit}
input:focus,select:focus{border-color:#d97706!important}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#d97706;border-radius:3px}
@keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-5px)}50%{transform:translateX(5px)}}
.shake{animation:shake .4s ease}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f7f7f5}
.login-card{width:400px;background:#fff;border-radius:14px;box-shadow:0 4px 32px rgba(0,0,0,.10);overflow:hidden}
.login-bar{height:4px;background:linear-gradient(90deg,#d97706,#f59e0b,#fbbf24)}
.login-body{padding:36px 36px 32px}
.login-icon{width:56px;height:56px;background:#fff8eb;border:2px solid #fde68a;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 14px}
.login-title{text-align:center;font-size:20px;font-weight:800;color:#1a1a1a;letter-spacing:-.3px}
.login-sub{text-align:center;font-size:12px;color:#888;margin:4px 0 24px}
.login-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#666;display:block;margin-bottom:4px}
.login-input{width:100%;padding:11px 13px;border:2px solid #e8e8e6;border-radius:8px;font-size:14px;font-family:inherit;background:#fafafa;transition:border .2s}
.login-input.error{border-color:#ef4444;background:#fff5f5}
.login-err{color:#ef4444;font-size:12px;margin-top:5px}
.login-btn{width:100%;margin-top:18px;padding:12px;background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.login-hint{text-align:center;margin-top:16px;font-size:12px;color:#bbb}

/* HEADER */
header{background:#fff;border-bottom:1px solid #e8e8e6;height:54px;display:flex;align-items:center;padding:0 20px;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.logo-box{width:32px;height:32px;background:linear-gradient(135deg,#d97706,#fbbf24);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:14px;flex-shrink:0}
.app-name{font-size:14px;font-weight:800;color:#1a1a1a;letter-spacing:-.2px}
.app-sub{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.8px}
.header-right{margin-left:auto;display:flex;gap:12px;align-items:center;font-size:11px}
.badge{background:#fff8eb;border:1px solid #fde68a;border-radius:5px;padding:2px 9px;color:#92400e;font-weight:600}
.btn-out{background:#fff;border:1.5px solid #fca5a5;color:#ef4444;padding:3px 9px;border-radius:5px;cursor:pointer;font-size:10px;font-family:inherit}

/* TABS */
nav{background:#fff;border-bottom:1px solid #e8e8e6;display:flex;padding:0 18px}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;padding:11px 15px;cursor:pointer;font-size:12px;font-family:inherit;color:#888;margin-bottom:-1px;transition:color .15s}
.tab.active{color:#d97706;border-bottom-color:#d97706;font-weight:700}

/* MAIN */
main{padding:18px 20px;max-width:100%;overflow-x:hidden}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;min-width:0}
.card{background:#fff;border-radius:11px;border:1.5px solid #c8c8c4;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);min-width:0;overflow:hidden;transition:border-color .2s,box-shadow .2s;box-sizing:border-box}
.card:focus-within{border-color:#d97706;box-shadow:0 0 0 3px rgba(217,119,6,.12),0 1px 4px rgba(0,0,0,.07)}
.sec-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:#1a1a1a;border-bottom:2px solid #c8c8c4;padding-bottom:7px;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#666;display:block;margin-bottom:3px}
.inp{background:#fff;border:1.5px solid #c8c8c4;color:#1a1a1a;padding:6px 9px;border-radius:7px;font-size:12px;font-family:'Courier New',monospace;width:100%;box-sizing:border-box;outline:none}
.inp-ro{background:#f3f3f1;color:#888;cursor:default}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:7px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.g3{display:grid;grid-template-columns:1fr 1fr 60px;gap:6px}
.mb7{margin-bottom:7px}
.btn-main{background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff;border:none;padding:7px 15px;border-radius:7px;cursor:pointer;font-weight:700;font-size:11px;font-family:inherit;box-shadow:0 2px 5px rgba(217,119,6,.2)}
.btn-sm{background:#fff;border:1.5px solid #e8e8e6;color:#888;padding:3px 8px;border-radius:5px;cursor:pointer;font-size:10px;font-family:inherit}
.btn-del{background:#fff;border:1.5px solid #fca5a5;color:#ef4444;padding:3px 8px;border-radius:5px;cursor:pointer;font-size:10px}
.btn-ok{background:#ecfdf5;border:1.5px solid #6ee7b7;color:#059669;padding:4px 11px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit}
table{width:100%;border-collapse:collapse}
th{background:#f3f3f1;color:#555;font-size:11px;text-transform:uppercase;letter-spacing:.4px;padding:7px 9px;text-align:left;border-bottom:1.5px solid #c8c8c4;font-weight:700;white-space:nowrap}
td{padding:6px 9px;font-size:12px;font-family:'Courier New',monospace;border-bottom:1px solid #ddd;color:#1a1a1a}
tr:nth-child(odd){background:#fff}
tr:nth-child(even){background:#f9f9f7}
tr.hit{background:#ecfdf5!important}
.uf-badge{background:#fff8eb;color:#92400e;border:1px solid #fde68a;border-radius:3px;padding:1px 6px;font-size:10px;font-weight:700}
.best-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:7px;padding:9px 12px;margin-top:8px}
pre{background:#f3f3f1;border:1px solid #e8e8e6;border-radius:7px;padding:12px;font-family:'Courier New',monospace;font-size:11px;line-height:1.7;white-space:pre-wrap;color:#1a1a1a}
.scroll-y{max-height:360px;overflow-y:auto}
.tag-acc{color:#d97706}
.tag-blue{color:#2563eb}
.tag-green{color:#059669}
.tag-muted{color:#888}
.fw700{font-weight:700}
.f14{font-size:14px}
.f15{font-size:15px}
.f12{font-size:12px}
.nf-badge{background:#fff8eb;color:#92400e;border:1px solid #fde68a;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700}
.tbl-wrap{overflow-x:auto}
</style>

function fmtBRL(v){return"R$ "+(parseFloat(v)||0).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".")}
function h(tag,cls,inner,attrs){
  var el=document.createElement(tag);
  if(cls) el.className=cls;
  if(inner!==undefined){if(typeof inner==='string') el.innerHTML=inner; else if(inner instanceof Node) el.appendChild(inner);}
  if(attrs) Object.assign(el,attrs);
  return el;
}
function inp(val,cls,ro,type,ph){
  var el=document.createElement('input');
  el.className='inp '+(cls||'');
  el.value=val||'';
  if(ro) el.readOnly=true;
  if(type) el.type=type;
  if(ph) el.placeholder=ph;
  return el;
}
function sel(val,opts,cls){
  var el=document.createElement('select');
  el.className='inp '+(cls||'');
  opts.forEach(function(o){
    var opt=document.createElement('option');
    opt.value=o; opt.textContent=o;
    if(o===val) opt.selected=true;
    el.appendChild(opt);
  });
  return el;
}
function row(children,cls){
  var el=document.createElement('div');
  el.className=cls||'';
  children.forEach(function(c){el.appendChild(c)});
  return el;
}
function field(lbl_txt,el_node){
  var wrap=document.createElement('div');
  var lbl=document.createElement('span');
  lbl.className='lbl'; lbl.textContent=lbl_txt;
  wrap.appendChild(lbl); wrap.appendChild(el_node);
  return wrap;
}

function render(){

  if(!app) return;
  app.innerHTML='';
  if(!STATE.auth){ app.appendChild(renderLogin()); return; }
  app.appendChild(renderApp());
}

function renderLogin(){
  var wrap=document.createElement('div');
  wrap.className='login-wrap';

  var card=document.createElement('div'); card.className='login-card';
  var bar=document.createElement('div'); bar.className='login-bar';
  card.appendChild(bar);

  var body=document.createElement('div'); body.className='login-body';
  var icon=document.createElement('div'); icon.className='login-icon'; icon.textContent='🔐';
  var title=document.createElement('div'); title.className='login-title'; title.textContent='MAIS ACESSÍVEL APP';
  var sub=document.createElement('div'); sub.className='login-sub'; sub.textContent='Área restrita — acesso por convite';
  var lbl=document.createElement('label'); lbl.className='login-label'; lbl.textContent='Código de Acesso';
  var inpEl=document.createElement('input'); inpEl.className='login-input'; inpEl.type='password'; inpEl.placeholder='Digite o código recebido...'; inpEl.autocomplete='off';
  var errEl=document.createElement('div'); errEl.className='login-err'; errEl.style.display='none'; errEl.textContent='✕ Código incorreto. Verifique e tente novamente.';
  var btnEl=document.createElement('button'); btnEl.className='login-btn'; btnEl.textContent='Entrar →';
  var hint=document.createElement('div'); hint.className='login-hint'; hint.textContent='Não tem acesso? Solicite um convite ao administrador.';

  function tryLogin(){
    if(inpEl.value===ACCESS_CODE){STATE.auth=true;render();}
    else{
      inpEl.classList.add('error'); errEl.style.display='block';
      inpEl.classList.add('shake'); setTimeout(function(){inpEl.classList.remove('shake');},500);
    }
  }
  btnEl.onclick=tryLogin;
  inpEl.onkeydown=function(e){if(e.key==='Enter')tryLogin();};

  body.appendChild(icon); body.appendChild(title); body.appendChild(sub);
  body.appendChild(lbl); body.appendChild(inpEl); body.appendChild(errEl);
  body.appendChild(btnEl); body.appendChild(hint);
  card.appendChild(body);
  wrap.appendChild(card);
  return wrap;
}

function renderApp(){
  var wrap=document.createElement('div');
  // header
  wrap.appendChild(renderHeader());
  // nav
  wrap.appendChild(renderNav());
  // main
  var main=document.createElement('main');
  if(STATE.tab==='cotacao') main.appendChild(renderCotacao());
  else if(STATE.tab==='salvas') main.appendChild(renderSalvas());
  else if(STATE.tab==='transportadoras') main.appendChild(renderTrans());
  else if(STATE.tab==='embalagens') main.appendChild(renderEmb());
  wrap.appendChild(main);
  return wrap;
}

// Shared helper - defined once
function mkFieldG(lbl,val,ro,type,ph,onChange){
  var el=inp(val,'',ro,type,ph);
  if(ro) el.classList.add('inp-ro');
  if(onChange) el.oninput=function(){STATE.form[onChange]=this.value; updateResumo();};
  return field(lbl,el);
}
function mkSelG(lbl,val,opts,onChange){
  var el=sel(val,opts);
  el.onchange=function(){
    STATE.form[onChange]=this.value;
    if(onChange==='ufDest'){STATE.manRows=getManRows(this.value);updateManTable();}
    updateResumo();
  };
  return field(lbl,el);
}

function calcTotalVol(){return STATE.prods.reduce(function(s,p){return s+(parseInt(p.vol)||0);},0);}
function calcCubagem(){
  // Lista cada produto com sua quantidade de volumes e dimensão
  var linhas = STATE.prods.filter(function(p){return p.nome&&p.vol>0;}).map(function(p){
    return (parseInt(p.vol)||1)+' VOL ('+( p.dim||'—')+')';
  });
  return linhas.length ? linhas.join(', ') : '—';
}
function calcResumo(){
  var f=STATE.form;
  // Pagador: CIF = remetente, FOB = destinatario
  var pagador = (f.frete==='FOB') ? (f.cnpjDest||'—') : f.cnpjRem;
  // Tipo de material: somente os 6 primeiros produtos
  var todosProds = STATE.prods.filter(function(p){return p.nome;});
  var primeiros6 = todosProds.slice(0,6).map(function(p){return p.nome;});
  var tipoMat = primeiros6.length ? primeiros6.join(', ') : '—';
  if(todosProds.length>6) tipoMat += ' e mais '+(todosProds.length-6)+' item(s)';
  return [
    '* Nº Cotação: '+(f.numeroCotacao||'—'),
    '* CNPJ do pagador do frete: '+pagador,
    '* CNPJ do destinatário: '+(f.cnpjDest||'—'),
    '* CNPJ do remetente: '+f.cnpjRem,
    '* CEP de origem: '+f.cepOrig.replace(/-/g,''),
    '* CEP de destino: '+(f.cepDest.replace(/-/g,'')||'—'),
    '* Tipo de material: '+tipoMat,
    '* Frete: '+(f.frete||'CIF'),
    '* Valor da nota fiscal: '+fmtBRL(f.valorNF),
    '* Quantidade de volumes: '+calcTotalVol(),
    '* Peso total: '+(f.pesoTotal||0)+' kg',
    '* Cubagem: '+calcCubagem()
  ].join('\n');
}

function buildManTable(){
  if(!STATE.manRows || !Array.isArray(STATE.manRows)) STATE.manRows=[];
  var tbl=document.createElement('table');
  tbl.style.cssText='width:100%;border-collapse:collapse;min-width:900px';
  tbl.innerHTML='<thead><tr><th>Nº</th><th>Transportadora</th><th>Tipo</th><th style="text-align:center">Tri.</th><th>Contato</th><th>Cotação</th><th>Prazo</th><th>Valor</th><th>Outros</th><th>Crédito%</th><th>Lucro%</th><th style="color:#059669">Valor Cobrar</th></tr></thead>';
  var tbody=document.createElement('tbody');
  STATE.manRows.forEach(function(r,i){
    var val=parseFloat(r.valor)||0;
    var out=parseFloat(r.outros)||0;
    var cred=parseFloat(r.credito)||0;
    var luc=parseFloat(r.lucro)||0;
    // Fórmula: ((Valor + Outros) * (1 + Credito/100)) * (1 + Lucro/100)
    var vc=val>0 ? (val+out)*(1+cred/100)*(1+luc/100) : 0;
    var has=val>0;
    var tr=document.createElement('tr');
    if(has) tr.className='hit';
    var rTipo=r.tipo||'';
    var rTipColor=rTipo==='AEREO'?'#d97706':rTipo==='FRETE'?'#059669':rTipo.includes('VIA')?'#2563eb':'#888';
    var rIsTri=r.triangulacao===true||r.triangulacao==='true'||r.triangulacao==='Sim';
    tr.innerHTML='<td class="tag-muted">'+r.nr+'</td>'+
      '<td style="font-weight:'+(has?700:400)+';color:'+(has?'#059669':'#1a1a1a')+';font-size:11px;white-space:nowrap">'+r.nome+'</td>'+
      '<td style="font-size:11px;font-weight:600;white-space:nowrap;color:'+rTipColor+'">'+rTipo+'</td>'+
      '<td style="text-align:center">'+(rIsTri?'<span style="color:#059669;font-weight:700;font-size:14px">✓</span>':'')+'</td>';
    tr.appendChild(buildPhoneCell(r.tel, r.nome));
    function mkTdInp(val,w,type,field){
      var td=document.createElement('td');
      var el=document.createElement('input'); el.className='inp'; el.value=val||''; el.style.width=w+'px'; el.style.fontSize='11px';
      if(type) el.type=type;
      el.oninput=function(){STATE.manRows[i][field]=this.value;};
      el.onblur=function(){STATE.manRows[i][field]=this.value; rebuildManRow(i);};
      td.appendChild(el); return td;
    }
    tr.appendChild(mkTdInp(r.cotacao,82,'text','cotacao'));
    tr.appendChild(mkTdInp(r.prazo,44,'text','prazo'));
    tr.appendChild(mkTdInp(r.valor,78,'number','valor'));
    tr.appendChild(mkTdInp(r.outros||'',68,'number','outros'));
    tr.appendChild(mkTdInp(r.credito||'',58,'number','credito'));
    tr.appendChild(mkTdInp(r.lucro,46,'number','lucro'));
    var tdVc=document.createElement('td'); tdVc.style.cssText='font-weight:700;color:'+(has?'#059669':'#888'); tdVc.textContent=has?fmtBRL(vc):'—';
    tr.appendChild(tdVc);
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  return tbl;
}
function rebuildManRow(i){
  var wrap=document.getElementById('manTableWrap');
  if(wrap){wrap.innerHTML=''; wrap.appendChild(buildManTable());}
}

  ufEl.onchange=function(){STATE.trUF=this.value; rebuildTransTable();};
  ufEl.style.width='110px';
  var cnt=document.createElement('div'); cnt.style.cssText='color:#888;font-size:12px;padding-bottom:5px'; cnt.id='trCount';
  fRow.appendChild(field('Buscar',srchEl)); fRow.appendChild(field('Estado',ufEl)); fRow.appendChild(cnt);
  wrap.appendChild(fRow);

  var tw=document.createElement('div'); tw.id='transTableWrap'; tw.style.cssText='background:#fff;border-radius:10px;border:1.5px solid #c8c8c4;overflow:hidden';
  wrap.appendChild(tw);
  buildTransTable(tw,cnt);
  return wrap;
}

function buildTransTable(wrap,cnt){
  var filtered=TRANS_DATA.filter(function(t){
    return(!STATE.trUF||t.uf===STATE.trUF)&&(!STATE.trSrch||t.nome.toLowerCase().includes(STATE.trSrch.toLowerCase()));
  });
  if(cnt) cnt.textContent=filtered.length+' registros';
  if(!wrap) wrap=document.getElementById('transTableWrap');
  if(!wrap) return;
  wrap.innerHTML='';
  var tbl=document.createElement('table');
  tbl.innerHTML='<thead><tr><th>UF</th><th>Transportadora</th><th>Telefone</th><th>Tipo</th><th>Triangulação</th><th style="text-align:center">Ações</th></tr></thead>';
  var tbody=document.createElement('tbody');
  filtered.forEach(function(t){
    // Achar índice real no TRANS_DATA
    var realIdx=TRANS_DATA.indexOf(t);
    var tr=document.createElement('tr'); tr.id='tr-row-'+realIdx;
    var tipColor=t.tipo==='AEREO'?'#d97706':t.tipo==='FRETE'?'#059669':t.tipo.includes('VIA')?'#2563eb':'#888';
    var isTri = t.triangulacao===true||t.triangulacao==='true'||t.triangulacao==='Sim';
    tr.innerHTML=
      '<td><span class="uf-badge">'+t.uf+'</span></td>'+
      '<td class="fw700">'+t.nome+'</td>'+
      '<td style="color:#2563eb;font-family:monospace;white-space:nowrap">'+t.tel+'</td>'+
      '<td><span style="color:'+tipColor+';font-weight:600">'+t.tipo+'</span></td>'+
      '<td style="text-align:center">'+(isTri?'<span style="color:#059669;font-size:16px;font-weight:700">✓</span>':'<span style="color:#ccc;font-size:13px">—</span>')+'</td>'+
      '<td style="text-align:center;white-space:nowrap"></td>';
    // Botão Editar
    var tdAcoes=tr.querySelector('td:last-child');
    var btnEdit=document.createElement('button');
    btnEdit.style.cssText='background:#fff8eb;border:1px solid #fde68a;color:#92400e;padding:3px 9px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600;margin-right:4px';
    btnEdit.textContent='✏️ Editar';
    btnEdit.onclick=function(){
      tr.innerHTML=
        '<td><input class="inp" id="eUF_'+realIdx+'" value="'+t.uf+'" style="width:50px;text-transform:uppercase"></td>'+
        '<td><input class="inp" id="eNome_'+realIdx+'" value="'+t.nome+'" style="min-width:160px"></td>'+
        '<td><input class="inp" id="eTel_'+realIdx+'" value="'+t.tel+'" style="width:130px"></td>'+
        '<td><select class="inp" id="eTipo_'+realIdx+'"><option>TRANSP</option><option>VIAÇÃO</option><option>FRETE</option><option>AEREO</option></select></td>'+
        '<td style="text-align:center"><input type="checkbox" id="eTri_'+realIdx+'" style="width:18px;height:18px;cursor:pointer;accent-color:#059669"></td>'+
        '<td style="white-space:nowrap"></td>';
      document.getElementById('eTipo_'+realIdx).value=t.tipo;
      var eTriEl=document.getElementById('eTri_'+realIdx);
      if(eTriEl) eTriEl.checked=(t.triangulacao===true||t.triangulacao==='true'||t.triangulacao==='Sim');
      var tdA=tr.querySelector('td:last-child');
      var btnSave=document.createElement('button');
      btnSave.style.cssText='background:#059669;color:#fff;border:none;padding:3px 9px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:700;margin-right:4px';
      btnSave.textContent='✓ Salvar';
      btnSave.onclick=function(){
        TRANS_DATA[realIdx].uf=document.getElementById('eUF_'+realIdx).value.toUpperCase().trim();
        TRANS_DATA[realIdx].nome=document.getElementById('eNome_'+realIdx).value.trim();
        TRANS_DATA[realIdx].tel=document.getElementById('eTel_'+realIdx).value.trim();
        TRANS_DATA[realIdx].tipo=document.getElementById('eTipo_'+realIdx).value;
        var eTriSave=document.getElementById('eTri_'+realIdx); TRANS_DATA[realIdx].triangulacao=eTriSave?eTriSave.checked:false;
        rebuildTransTable();
      };
      var btnCancel=document.createElement('button');
      btnCancel.style.cssText='background:#fff;border:1.5px solid #c8c8c4;color:#888;padding:3px 9px;border-radius:5px;cursor:pointer;font-size:11px';
      btnCancel.textContent='✕';
      btnCancel.onclick=function(){rebuildTransTable();};
      tdA.appendChild(btnSave); tdA.appendChild(btnCancel);
    };
    // Botão Excluir
    var btnDel=document.createElement('button');
    btnDel.style.cssText='background:#fff5f5;border:1px solid #fca5a5;color:#ef4444;padding:3px 9px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600';
    btnDel.textContent='🗑 Excluir';
    btnDel.onclick=function(){
      if(confirm('Excluir "'+t.nome+'"?')){
        TRANS_DATA.splice(realIdx,1);
        rebuildTransTable();
      }
    };
    tdAcoes.appendChild(btnEdit); tdAcoes.appendChild(btnDel);
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody); wrap.appendChild(tbl);
}
function rebuildTransTable(){
  buildTransTable(document.getElementById('transTableWrap'),document.getElementById('trCount'));
}

// ── EMBALAGENS ──────────────────────────
function renderEmb(){
  var wrap=document.createElement('div');

  // ── Nova embalagem ──
  var addCard=document.createElement('div'); addCard.className='card'; addCard.style.marginBottom='12px';
  addCard.innerHTML='<div class="sec-title">➕ Nova Embalagem</div>';
  var addRow=document.createElement('div'); addRow.style.cssText='display:grid;grid-template-columns:1fr 200px 100px auto;gap:8px;align-items:flex-end';
  var eNome=document.createElement('input'); eNome.className='inp'; eNome.placeholder='Descrição do produto';
  var eDim=document.createElement('input'); eDim.className='inp'; eDim.placeholder='Comp x Larg x Alt (cm)'; eDim.title='Dimensão: Comprimento x Largura x Altura';
  var eCabe=document.createElement('input'); eCabe.className='inp'; eCabe.placeholder='Qtd/Vol';
  var eBtn=document.createElement('button'); eBtn.className='btn-main'; eBtn.textContent='+ Adicionar';
  eBtn.onclick=function(){
    var nome=(eNome.value||'').trim();
    if(!nome){alert('Informe a descrição do produto!'); return;}
    EMBALAGENS.unshift({n:nome, d:eDim.value.trim()||'—', c:eCabe.value.trim()||'—'});
    eNome.value=''; eDim.value=''; eCabe.value='';
    rebuildEmbTable();
  };
  var eDimField=field('Dimensão (Comp x Larg x Alt)',eDim);
  var eCabeField=field('Qtd/Vol',eCabe);
  [field('Descrição',eNome),eDimField,eCabeField,eBtn].forEach(function(el){addRow.appendChild(el);});
  addCard.appendChild(addRow);
  wrap.appendChild(addCard);

  // ── Filtro ──
  var fRow=document.createElement('div'); fRow.style.cssText='display:flex;gap:12px;margin-bottom:12px;align-items:flex-end';
  var srchEl=document.createElement('input'); srchEl.className='inp'; srchEl.style.flex='1'; srchEl.placeholder='Buscar produto / embalagem...'; srchEl.value=STATE.embSrch;
  srchEl.oninput=function(){STATE.embSrch=this.value; rebuildEmbTable();};
  var cnt=document.createElement('div'); cnt.style.cssText='color:#888;font-size:12px;padding-bottom:5px'; cnt.id='embCount';
  fRow.appendChild(field('Buscar',srchEl)); fRow.appendChild(cnt);
  wrap.appendChild(fRow);
  var tw=document.createElement('div'); tw.id='embTableWrap'; tw.style.cssText='background:#fff;border-radius:10px;border:1.5px solid #c8c8c4;overflow:hidden';
  wrap.appendChild(tw);
  buildEmbTable(tw,cnt);
  return wrap;
}
function buildEmbTable(wrap,cnt){
  var filtered=EMBALAGENS.filter(function(e){return!STATE.embSrch||e.n.toLowerCase().includes(STATE.embSrch.toLowerCase());});
  if(cnt) cnt.textContent=filtered.length+' de '+EMBALAGENS.length+' itens';
  if(!wrap) wrap=document.getElementById('embTableWrap');
  if(!wrap) return;
  wrap.innerHTML='';
  var tbl=document.createElement('table');
  tbl.innerHTML='<thead><tr><th style="width:50%">Descrição do Produto</th><th>Dimensão (Comp x Larg x Alt)</th><th style="text-align:center">Qtd/Vol</th><th style="text-align:center">Ações</th></tr></thead>';
  var tbody=document.createElement('tbody');
  filtered.forEach(function(e){
    var realIdx=EMBALAGENS.indexOf(e);
    var tr=document.createElement('tr'); tr.id='emb-row-'+realIdx;
    tr.innerHTML='<td class="fw700">'+e.n+'</td><td style="color:#2563eb;font-family:monospace;font-size:11px">'+e.d+'</td><td style="color:#888;text-align:center">'+e.c+'</td>';
    var tdA=document.createElement('td'); tdA.style.cssText='text-align:center;white-space:nowrap';
    // Editar
    var btnEdit=document.createElement('button');
    btnEdit.style.cssText='background:#fff8eb;border:1px solid #fde68a;color:#92400e;padding:3px 9px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600;margin-right:4px';
    btnEdit.textContent='✏️ Editar';
    btnEdit.onclick=function(){
      tr.innerHTML=
        '<td><input class="inp" id="en_'+realIdx+'" value="'+e.n+'" style="min-width:180px"></td>'+
        '<td><input class="inp" id="ed_'+realIdx+'" value="'+e.d+'" style="width:140px"></td>'+
        '<td><input class="inp" id="ec_'+realIdx+'" value="'+e.c+'" style="width:70px;text-align:center"></td>'+
        '<td style="white-space:nowrap"></td>';
      var tdS=tr.querySelector('td:last-child');
      var btnS=document.createElement('button');
      btnS.style.cssText='background:#059669;color:#fff;border:none;padding:3px 9px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:700;margin-right:4px';
      btnS.textContent='✓ Salvar';
      btnS.onclick=function(){
        EMBALAGENS[realIdx].n=document.getElementById('en_'+realIdx).value.trim()||e.n;
        EMBALAGENS[realIdx].d=document.getElementById('ed_'+realIdx).value.trim();
        EMBALAGENS[realIdx].c=document.getElementById('ec_'+realIdx).value.trim();
        rebuildEmbTable();
      };
      var btnC=document.createElement('button');
      btnC.style.cssText='background:#fff;border:1.5px solid #c8c8c4;color:#888;padding:3px 9px;border-radius:5px;cursor:pointer;font-size:11px';
      btnC.textContent='✕';
      btnC.onclick=function(){rebuildEmbTable();};
      tdS.appendChild(btnS); tdS.appendChild(btnC);
    };
    // Excluir
    var btnDel=document.createElement('button');
    btnDel.style.cssText='background:#fff5f5;border:1px solid #fca5a5;color:#ef4444;padding:3px 9px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600';
    btnDel.textContent='🗑';
    btnDel.onclick=function(){
      if(confirm('Excluir "'+e.n+'"?')){EMBALAGENS.splice(realIdx,1); rebuildEmbTable();}
    };
    tdA.appendChild(btnEdit); tdA.appendChild(btnDel);
    tr.appendChild(tdA);
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody); wrap.appendChild(tbl);
}
function rebuildEmbTable(){
  buildEmbTable(document.getElementById('embTableWrap'),document.getElementById('embCount'));
}

// ── BOOT ──

render();
</script>
</body>
</html>
